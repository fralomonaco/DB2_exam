<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Database 2 — Quiz Arcade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Spline+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#16110d; --bg2:#1f1812; --card:#241c15; --card2:#2c2219; --ink:#f5eee2; --soft:#a99c89; --line:#3a2e22;
    --conc:#4f8cff; --rank:#ff7a3d; --phys:#b07cff; --trig:#2fd398; --jpa:#ffc24b; --theo:#ff6b9d;
    --ok:#36d27a; --no:#ff5a5a; --gold:#ffce4d;
    --shadow:0 20px 50px -20px rgba(0,0,0,.7);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{font-family:'Spline Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;
    padding:clamp(14px,3.5vw,40px);min-height:100vh;
    background-image:radial-gradient(circle at 8% 0%,rgba(79,140,255,.10),transparent 40%),radial-gradient(circle at 95% 12%,rgba(255,122,61,.10),transparent 42%),radial-gradient(circle at 50% 110%,rgba(176,124,255,.10),transparent 45%);}
  .wrap{max-width:760px;margin:0 auto}
  .mono{font-family:'IBM Plex Mono',monospace}
  .hide{display:none!important}

  header{margin-bottom:22px}
  .kicker{font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--soft);margin-bottom:8px}
  h1{font-family:'Fraunces',serif;font-weight:900;font-size:clamp(32px,8vw,56px);line-height:.95;letter-spacing:-.02em}
  h1 em{font-style:italic;font-weight:400;background:linear-gradient(90deg,var(--rank),var(--jpa));-webkit-background-clip:text;background-clip:text;color:transparent}

  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow)}

  .levelcard{padding:18px 20px;margin:18px 0;display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,var(--card2),var(--card))}
  .lvlbadge{width:58px;height:58px;border-radius:16px;flex:none;display:flex;align-items:center;justify-content:center;
    font-family:'Fraunces',serif;font-weight:900;font-size:24px;color:#1a130c;background:linear-gradient(135deg,var(--gold),#ffb02e);box-shadow:0 6px 18px -6px rgba(255,206,77,.6)}
  .lvlmeta{flex:1;min-width:0}
  .lvltitle{font-family:'Fraunces',serif;font-weight:600;font-size:18px}
  .lvlsub{font-size:12.5px;color:var(--soft);margin-top:1px}
  .xpbar{height:9px;border-radius:6px;background:#3a2e22;overflow:hidden;margin-top:9px}
  .xpbar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),#ff9d3e);transition:width .6s cubic-bezier(.2,.8,.2,1)}

  .statsrow{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
  @media(max-width:560px){.statsrow{grid-template-columns:1fr}}
  .scard{padding:16px;display:flex;align-items:center;gap:14px}
  .scard .meta .t{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--soft)}
  .scard .meta .v{font-family:'Fraunces',serif;font-weight:600;font-size:26px;line-height:1.1;margin-top:2px}
  .scard .meta .v small{font-size:14px;color:var(--soft)}

  .donut-wrap{position:relative;flex:none}
  .donut-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
  .donut-center .pc{font-family:'Fraunces',serif;font-weight:600}

  .sec{font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--soft);margin:6px 4px 12px}
  .mastery{padding:16px 18px;margin-bottom:18px}
  .mrow{display:flex;align-items:center;gap:12px;padding:8px 0}
  .mrow .nm{flex:none;width:128px;font-size:13.5px;font-weight:500;display:flex;align-items:center;gap:8px}
  .dot{width:10px;height:10px;border-radius:4px;flex:none}
  .mtrack{flex:1;height:10px;border-radius:6px;background:#3a2e22;overflow:hidden}
  .mtrack i{display:block;height:100%;border-radius:6px;transition:width .6s cubic-bezier(.2,.8,.2,1)}
  .mrow .pct{flex:none;width:64px;text-align:right;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--soft)}

  .playgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  @media(max-width:560px){.playgrid{grid-template-columns:1fr}}
  .pbtn{padding:16px 18px;border:1px solid var(--line);border-radius:16px;background:var(--card);cursor:pointer;text-align:left;
    transition:transform .12s,border-color .12s,background .12s;-webkit-tap-highlight-color:transparent;color:var(--ink);font-family:inherit}
  .pbtn:hover{transform:translateY(-2px);border-color:var(--soft)}
  .pbtn:active{transform:scale(.98)}
  .pbtn.big{grid-column:1/-1;background:linear-gradient(135deg,var(--rank),#ff5c2e);border:none;color:#1a130c}
  .pbtn .lab{font-weight:700;font-size:16px;display:flex;align-items:center;gap:9px}
  .pbtn .meta2{font-size:12px;color:var(--soft);margin-top:3px}
  .pbtn.big .meta2{color:rgba(26,19,12,.7)}

  /* QUIZ */
  .qtop{display:flex;align-items:center;gap:12px;margin-bottom:16px}
  .qtop .back{background:none;border:1px solid var(--line);color:var(--soft);border-radius:12px;padding:8px 12px;cursor:pointer;font-family:inherit;font-size:13px}
  .qprog{flex:1;height:8px;border-radius:6px;background:#3a2e22;overflow:hidden}
  .qprog i{display:block;height:100%;background:linear-gradient(90deg,var(--rank),var(--jpa));transition:width .3s}
  .qcount{font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--soft)}
  .streakchip{font-family:'IBM Plex Mono',monospace;font-size:12.5px;font-weight:600;color:var(--gold);display:flex;align-items:center;gap:5px}
  .qcard{padding:24px 22px}
  .qtag{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:600;padding:4px 11px;border-radius:20px;margin-bottom:14px}
  .qtext{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(20px,4.5vw,26px);line-height:1.25;margin-bottom:20px}
  .opt{display:block;width:100%;text-align:left;padding:15px 16px;margin-bottom:10px;border:1.5px solid var(--line);border-radius:14px;
    background:var(--card2);color:var(--ink);font-family:inherit;font-size:15px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
  .opt:hover:not(:disabled){border-color:var(--soft)}
  .opt:disabled{cursor:default}
  .opt.correct{border-color:var(--ok);background:rgba(54,210,122,.16);font-weight:600}
  .opt.wrong{border-color:var(--no);background:rgba(255,90,90,.14)}
  .opt .mk{float:right;font-weight:700}
  .expl{margin-top:6px;padding:14px 16px;border-radius:14px;background:var(--bg2);border:1px solid var(--line);font-size:14px;color:var(--soft);display:none}
  .expl.show{display:block;animation:pop .3s ease}
  .expl b{color:var(--ink)}
  .nextbtn{margin-top:16px;width:100%;padding:15px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--rank),#ff5c2e);
    color:#1a130c;font-family:inherit;font-weight:700;font-size:16px;cursor:pointer;display:none}
  .nextbtn.show{display:block;animation:pop .3s ease}
  .floatxp{position:fixed;left:50%;top:40%;transform:translateX(-50%);font-family:'Fraunces',serif;font-weight:900;font-size:42px;
    color:var(--gold);pointer-events:none;opacity:0;text-shadow:0 4px 20px rgba(255,206,77,.5)}
  .floatxp.go{animation:floatup 1s ease forwards}
  @keyframes floatup{0%{opacity:0;transform:translate(-50%,10px) scale(.6)}25%{opacity:1;transform:translate(-50%,-10px) scale(1.1)}100%{opacity:0;transform:translate(-50%,-70px) scale(1)}}
  @keyframes pop{0%{transform:scale(.96);opacity:0}100%{transform:scale(1);opacity:1}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
  .shake{animation:shake .35s}

  /* RESULT */
  .result{padding:30px 24px;text-align:center}
  .result .emoji{font-size:54px}
  .result h2{font-family:'Fraunces',serif;font-weight:900;font-size:32px;margin:8px 0}
  .result .msg{color:var(--soft);margin-bottom:20px}
  .rstats{display:flex;justify-content:center;gap:26px;margin:18px 0 24px;flex-wrap:wrap}
  .rstats div .n{font-family:'Fraunces',serif;font-weight:600;font-size:30px}
  .rstats div .l{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--soft)}
  .rbtns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .rbtns button{padding:14px 24px;border-radius:14px;font-family:inherit;font-weight:700;font-size:15px;cursor:pointer;border:1px solid var(--line);background:var(--card2);color:var(--ink)}
  .rbtns button.primary{border:none;background:linear-gradient(135deg,var(--rank),#ff5c2e);color:#1a130c}

  footer{margin-top:26px;text-align:center;color:var(--soft);font-size:12px;font-family:'IBM Plex Mono',monospace}
  .reset{margin-top:12px;background:none;border:1px solid var(--line);color:var(--soft);font-size:11px;padding:6px 14px;border-radius:20px;cursor:pointer;font-family:'IBM Plex Mono',monospace}
</style>
</head>
<body>
<div class="wrap">

  <!-- HOME -->
  <div id="home">
    <header>
      <div class="kicker">Basi di Dati 2 · allenamento</div>
      <h1>Quiz <em>Arcade</em></h1>
      <div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap">
        <a href="index.html" style="font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--soft);text-decoration:none;border:1px solid var(--line);padding:7px 13px;border-radius:10px">← Tracker</a>
        <a href="guide.html" style="font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--soft);text-decoration:none;border:1px solid var(--line);padding:7px 13px;border-radius:10px">Guide Esercizi</a>
      </div>
    </header>
    <div class="card levelcard">
      <div class="lvlbadge" id="lvlNum">1</div>
      <div class="lvlmeta">
        <div class="lvltitle" id="lvlTitle">Matricola</div>
        <div class="lvlsub" id="lvlSub">0 / 120 XP al prossimo livello</div>
        <div class="xpbar"><i id="xpFill" style="width:0%"></i></div>
      </div>
    </div>
    <div class="statsrow">
      <div class="card scard">
        <div id="accDonut"></div>
        <div class="meta"><div class="t">Precisione</div><div class="v" id="accV">—</div></div>
      </div>
      <div class="card scard">
        <div class="meta"><div class="t">Risposte</div><div class="v" id="ansV">0</div></div>
      </div>
      <div class="card scard">
        <div class="meta"><div class="t">Streak record</div><div class="v" id="bestV">0 <small>🔥</small></div></div>
      </div>
    </div>
    <div class="sec">Padronanza per argomento</div>
    <div class="card mastery" id="mastery"></div>
    <div class="sec">Gioca</div>
    <div class="playgrid" id="playgrid"></div>
    <footer>
      <div id="fnote"></div>
      <button class="reset" onclick="resetAll()">↺ Azzera statistiche</button>
    </footer>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="hide">
    <div class="qtop">
      <button class="back" onclick="goHome()">← Esci</button>
      <div class="qprog"><i id="qProg" style="width:0%"></i></div>
      <div class="qcount" id="qCount">1/10</div>
      <div class="streakchip" id="qStreak">🔥 0</div>
    </div>
    <div class="card qcard">
      <span class="qtag" id="qTag"></span>
      <div class="qtext" id="qText"></div>
      <div id="qOpts"></div>
      <div class="expl" id="qExpl"></div>
      <button class="nextbtn" id="qNext" onclick="nextQ()">Avanti →</button>
    </div>
  </div>

  <!-- RESULT -->
  <div id="result" class="hide">
    <div class="card result">
      <div class="emoji" id="rEmoji">🎉</div>
      <h2 id="rTitle">Sessione completata!</h2>
      <div class="msg" id="rMsg"></div>
      <div class="rstats">
        <div><div class="n" id="rScore">0/0</div><div class="l">corrette</div></div>
        <div><div class="n" id="rXp">+0</div><div class="l">XP</div></div>
        <div><div class="n" id="rAcc">0%</div><div class="l">precisione</div></div>
      </div>
      <div class="rbtns">
        <button class="primary" onclick="replay()">Rigioca ↻</button>
        <button onclick="goHome()">Home</button>
      </div>
    </div>
  </div>

  <div class="floatxp" id="floatxp"></div>
</div>

<script>
const TOPICS={
  conc:{name:"Concurrency control",color:"var(--conc)"},
  rank:{name:"Ranking (TA/FA)",color:"var(--rank)"},
  phys:{name:"Physical DB",color:"var(--phys)"},
  trig:{name:"Triggers",color:"var(--trig)"},
  jpa:{name:"JPA",color:"var(--jpa)"},
  theo:{name:"Teoria",color:"var(--theo)"},
};
const Q=[
 /* ==================== CONCURRENCY CONTROL ==================== */
 {t:"conc",q:"Se il grafo dei conflitti di uno schedule è aciclico, lo schedule è sicuramente in...",o:["VSR ma non CSR","CSR (e quindi anche VSR)","Strict 2PL","TS mono"],c:1,e:"Grafo dei conflitti aciclico ⇔ schedule in <b>CSR</b>. E poiché <b>CSR ⊆ VSR</b>, è anche view-serializzabile. Ricorda: VSR si verifica controllando la view-equivalenza (reads-from + final writes), CSR si verifica solo col grafo dei conflitti."},
 {t:"conc",q:"Qual è la catena di inclusioni corretta tra le classi di serializzabilità?",o:["VSR ⊆ CSR ⊆ 2PL","Strict 2PL ⊆ 2PL ⊆ CSR ⊆ VSR","2PL ⊆ Strict 2PL ⊆ CSR","CSR ⊆ 2PL ⊆ VSR"],c:1,e:"<b>Strict 2PL ⊆ 2PL ⊆ CSR ⊆ VSR</b>: ogni classe è più restrittiva della successiva. Strict 2PL è la più restrittiva (lock rilasciati solo a commit/abort), VSR è la più permissiva."},
 {t:"conc",q:"In Strict 2PL, quando può essere rilasciato un lock?",o:["Appena finita l'operazione","Solo dopo il commit/abort della transazione","Durante la fase di shrinking, in qualsiasi momento","Subito dopo l'acquisizione"],c:1,e:"In <b>Strict 2PL</b> i lock si tengono fino a fine transazione (commit/abort): questo evita le letture sporche (dirty read) e le letture non ripetibili. È la classe usata nella pratica da quasi tutti i DBMS."},
 {t:"conc",q:"Le scritture cieche (blind write) sono decisive per stabilire l'appartenenza a quale classe?",o:["VSR (uno schedule può essere VSR ma non CSR)","Strict 2PL","TS mono","Nessuna"],c:0,e:"Una scrittura cieca (scrivo senza aver letto prima) può rendere uno schedule <b>view-equivalente</b> a uno seriale pur avendo cicli nel grafo dei conflitti: VSR sì, CSR no. Queste sono le uniche situazioni in cui VSR e CSR differiscono."},
 {t:"conc",q:"Una dirty read si verifica quando una transazione legge un dato...",o:["già committato","scritto da una transazione non ancora committata","scritto da sé stessa","mai modificato"],c:1,e:"<b>Dirty read</b>: leggo un valore prodotto da una transazione che potrebbe ancora abortire, rendendo la mia lettura invalida. Strict 2PL la previene perché i lock in scrittura si rilasciano solo dopo il commit."},
 {t:"conc",q:"Il deadlock tra transazioni si verifica quando...",o:["una transazione attende un lock per sempre da sola","due o più transazioni si attendono a vicenda in ciclo","il log è pieno","non ci sono indici"],c:1,e:"<b>Deadlock</b> = attesa circolare: T1 aspetta una risorsa bloccata da T2 che a sua volta aspetta una bloccata da T1. Si gestisce con il timeout, il wound-wait/wait-die, o il grafo delle attese (wait-for graph)."},
 {t:"conc",q:"Nel timestamp mono (TS Mono), una lettura r_t(x) è ammessa se...",o:["t ≥ WTM(x)","t < WTM(x)","t ≤ RTM(x)","t ≥ RTM(x)"],c:0,e:"In <b>TS Mono</b>, r_t(x) è ammessa se <b>t ≥ WTM(x)</b> (leggo una versione scritta prima di me). Se t < WTM(x), la transazione t viene killata perché qualcuno con timestamp maggiore ha già scritto una versione più nuova."},
 {t:"conc",q:"Nel timestamp mono (TS Mono), una scrittura w_t(x) è ammessa se...",o:["t ≥ WTM(x) e t ≥ RTM(x)","t < WTM(x) e t < RTM(x)","t ≤ RTM(x)","sempre"],c:0,e:"w_t(x) ammessa se <b>t ≥ WTM(x) E t ≥ RTM(x)</b>: non posso sovrascrivere qualcosa che qualcuno con timestamp maggiore ha già letto o scritto. Se una delle due condizioni è violata, la transazione viene killata e riavviata."},
 {t:"conc",q:"Nel TS Multi (Snapshot Isolation), una transazione T_t legge...",o:["l'ultima versione committata di x prima di t","sempre la versione più recente di x","una versione scritta da sé stessa","nulla, attende sempre"],c:0,e:"In <b>TS Multi / Snapshot Isolation</b>, ogni transazione vede una <i>snapshot</i> del DB al momento del suo start: legge l'<b>ultima versione committata prima del suo timestamp</b>. Le scritture creano nuove versioni senza bloccare le letture."},
 {t:"conc",q:"Uno schedule che non è in VSR è sicuramente anche fuori da...",o:["Solo Strict 2PL","Solo 2PL","Tutte le altre classi: CSR, 2PL, Strict 2PL, TS Mono","Solo TS Multi"],c:2,e:"VSR è la classe più grande: se uno schedule non è nemmeno VSR, non può stare in nessuna classe più restrittiva. La catena è: <b>Strict 2PL ⊆ 2PL ⊆ CSR ⊆ VSR</b>, quindi fuori da VSR ⇒ fuori da tutto."},
 {t:"conc",q:"Un lock condiviso (Shared Lock / S-lock) su una risorsa può essere acquisito da una transazione T se...",o:["nessun'altra transazione ha lock esclusivo sulla risorsa","la risorsa è completamente libera","T ha già un lock esclusivo sulla risorsa","il grafo non ha cicli"],c:0,e:"<b>S-lock</b> (lettura): più transazioni possono tenere S-lock sullo stesso oggetto contemporaneamente. Viene bloccato solo se esiste un <b>X-lock</b> (esclusivo) tenuto da un'altra transazione."},
 {t:"conc",q:"Nel locking gerarchico (hierarchical locking), cos'è un ISL (Intention Shared Lock)?",o:["Un lock esclusivo su un'intera tabella","Un lock che indica che un discendente della risorsa ha o avrà un S-lock","Un lock che blocca ogni altra transazione","Un lock identico all'S-lock"],c:1,e:"<b>ISL</b> = Intention Shared Lock: si acquisisce su un nodo padre (es. tabella, database) per segnalare che <i>qualche nodo discendente</i> ha o avrà un S-lock. Serve a evitare di scendere nell'albero per trovare conflitti."},
 {t:"conc",q:"Per rilevare un deadlock senza attendere un timeout, si usa...",o:["Il wait-for graph: se contiene un ciclo c'è deadlock","Il grafo dei conflitti dello schedule","Un B+-tree sull'orario di inizio delle transazioni","Il log delle scritture"],c:0,e:"Il <b>wait-for graph</b> ha un nodo per ogni transazione attiva; c'è un arco da T1 a T2 se T1 attende un lock tenuto da T2. Un <b>ciclo</b> nel grafo indica deadlock."},
 {t:"conc",q:"La 'non-repeatable read' avviene quando...",o:["leggo un dato mai scritto","la stessa lettura su uno stesso oggetto restituisce valori diversi nella stessa transazione","scrivo senza aver letto","faccio rollback"],c:1,e:"<b>Non-repeatable read</b>: r_i(x)…r_i(x) e i due valori sono diversi perché T_j ha modificato x in mezzo. Evitata da Strict 2PL e da Serializable."},
 {t:"conc",q:"Il protocollo 2PL (Two-Phase Locking) prevede due fasi: growing e shrinking. Cosa NON è permesso in 2PL?",o:["Acquisire un lock dopo averlo rilasciato","Acquisire lock durante la fase growing","Rilasciare lock durante la fase shrinking","Tenere un lock durante tutta la transazione"],c:0,e:"In <b>2PL</b>, una volta rilasciato il primo lock inizia la fase di shrinking: da quel momento non si possono più acquisire nuovi lock. <b>Acquisire dopo aver rilasciato viola 2PL</b>."},
 {t:"conc",q:"Nello schedule S = r1(x) w2(x) r1(x), qual anomalia si verifica?",o:["Dirty read","Non-repeatable read","Lost update","Phantom read"],c:1,e:"T1 legge x due volte (r1(x)…r1(x)) ma T2 ha scritto x nel mezzo: la seconda lettura dà un valore diverso dalla prima. Questo è un classico caso di <b>non-repeatable read</b>."},
 {t:"conc",q:"Obermarck's algorithm è usato per rilevare deadlock in...",o:["Sistemi centralizzati","Sistemi distribuiti (più siti)","Sistemi in-memory","Architetture cloud"],c:1,e:"<b>Obermarck</b> è un algoritmo per il rilevamento di deadlock <b>globali in sistemi distribuiti</b>: ogni sito gestisce un wait-for graph locale e scambia informazioni con gli altri siti per rilevare cicli globali."},

 /* ==================== RANKING / SKYLINE ==================== */
 {t:"rank",q:"L'algoritmo di Fagin (FA) interrompe la fase di accesso ordinato quando ha visto...",o:["il primo oggetto di una lista","k oggetti presenti in comune in tutte le liste","tutti gli oggetti di tutte le liste","la soglia"],c:1,e:"<b>FA</b> fa accessi ordinati su tutte le liste finché trova <b>k oggetti comuni a tutte le liste</b>. Solo allora completa gli score mancanti con accessi casuali. Non usa nessuna soglia."},
 {t:"rank",q:"L'algoritmo della soglia (TA) garantisce correttezza se la funzione di scoring è...",o:["qualsiasi","monotona negli argomenti","strettamente decrescente","costante"],c:1,e:"TA si basa sulla <b>soglia τ = f(s_1, s_2, …)</b> dove s_i è lo score visto nell'i-esima lista all'iterazione corrente. La soglia è significativa solo se f è <b>monotona</b>: nessun oggetto non ancora visto può avere score > τ."},
 {t:"rank",q:"In TA, ad ogni accesso ordinato su una lista si esegue anche...",o:["un accesso ordinato sulle altre liste","un accesso casuale sulle altre liste per completare lo score dell'oggetto","un commit","niente"],c:1,e:"In <b>TA</b>, quando vedo l'oggetto x per la prima volta in una lista, faccio <b>accessi casuali</b> sulle altre liste per ottenere subito tutti gli score e calcolare f(x). Questo permette di confrontare subito x con la soglia."},
 {t:"rank",q:"Rispetto a FA, l'algoritmo TA tipicamente...",o:["fa più accessi ordinati","si ferma prima grazie alla soglia (spesso più efficiente)","non termina mai","richiede di leggere tutte le liste per intero"],c:1,e:"<b>TA</b> è instance-optimal (nel suo modello): si ferma appena k oggetti battono la soglia, spesso molto prima che FA trovi k oggetti comuni. Ma TA fa più accessi casuali intermedi."},
 {t:"rank",q:"L'algoritmo NRA (No Random Access) è utile quando...",o:["le liste non sono ordinate","gli accessi casuali alle liste sono impossibili o molto costosi","si vuole calcolare lo skyline","la funzione di scoring non è monotona"],c:1,e:"<b>NRA</b> non fa mai accessi casuali: stima upper e lower bound per ogni oggetto usando solo gli score visti negli accessi ordinati. Ideale quando gli accessi random alle liste sono proibiti (es. liste remote, streaming)."},
 {t:"rank",q:"Un tuple t domina una tuple s nel senso dello skyline quando...",o:["t ha almeno un attributo migliore di s e nessuno peggiore","t è migliore di s su tutti gli attributi","t e s hanno lo stesso score su tutti gli attributi","t ha score totale maggiore di s"],c:0,e:"<b>Dominanza</b>: t ≺ s se <b>t è ≥ s su tutti gli attributi</b> e <b>strettamente > su almeno uno</b>. Se t domina s, allora s non è nello skyline perché t è 'almeno buono quanto s su tutto'."},
 {t:"rank",q:"In SFS (Sort-Filter-Skyline), le tuple vengono processate in quale ordine?",o:["Ordine casuale","Ordine crescente di un punteggio cumulativo (es. somma pesata)","Ordine decrescente dell'id","Ordine alfabetico"],c:1,e:"<b>SFS</b> ordina prima le tuple per un punteggio monotono (es. la somma degli attributi, o una norma L1). Poi scansiona in questo ordine: una tupla può essere dominata solo da tuple già processate (che vengono prima nell'ordine)."},
 {t:"rank",q:"Cosa succede allo skyline di un dataset D se si rimuove una colonna (dimensione)?",o:["Può solo restare uguale o ridursi","Può solo restare uguale o crescere","Rimane sempre identico","Diventa sempre vuoto"],c:1,e:"Rimuovere una dimensione può <b>far crescere lo skyline</b> (alcune tuple prima dominate ora non lo sono più perché manca quella dimensione) ma non lo riduce mai. Caso limite: rimane uguale."},
 {t:"rank",q:"Un tuple fa parte dello skyline se e solo se...",o:["ha il valore massimo su almeno un attributo","non è dominata da nessun'altra tupla del dataset","ha la somma degli attributi massima","esiste una funzione lineare che la massimizza"],c:1,e:"Lo <b>skyline</b> contiene tutte e sole le tuple che <b>non sono dominate da nessun'altra</b>. Equivalentemente, ogni tupla dello skyline è ottima per almeno una funzione di scoring monotona."},
 {t:"rank",q:"Nella condizione di ottimalità potenziale dello skyline, si usa la classe M di funzioni...",o:["lineari L1","monotone M","qualsiasi","solo L∞"],c:1,e:"Una tupla t è <b>potenzialmente ottima</b> se esiste almeno una funzione <b>monotona</b> f ∈ M tale che f(t) > f(s) per ogni s ≠ t. Limitarsi alle funzioni lineari sarebbe più restrittivo: il skyline cattura l'ottimalità per qualsiasi preferenza monotona."},
 {t:"rank",q:"Nei TDE, per calcolare il top-k con TA su 3 liste, la soglia τ all'iterazione i è...",o:["il massimo score visto finora","f(v1_i, v2_i, v3_i) dove v_j è l'ultimo score letto dalla lista j","il minimo score nel top-k corrente","0"],c:1,e:"La <b>soglia</b> in TA è τ = f(v1, v2, v3) dove v_j è lo score dell'ultimo oggetto letto in ordine dalla lista j. Poiché f è monotona e le liste sono ordinate decrescenti, nessun oggetto non ancora visto può superare τ."},
 {t:"rank",q:"FA e TA producono sempre lo stesso top-k?",o:["Sì, entrambi sono corretti e producono il top-k esatto","No, TA può sbagliare se la funzione non è monotona","No, FA produce un top-k approssimato","Solo per k=1"],c:0,e:"Entrambi <b>FA e TA sono algoritmi corretti</b> (non approssimativi): producono sempre il top-k esatto, purché la funzione di scoring sia monotona. Differiscono solo nell'efficienza (numero di accessi)."},

 /* ==================== PHYSICAL DB ==================== */
 {t:"phys",q:"Costo di un nested-loop join con R esterna: per ogni tupla di R si scansiona S. La formula è...",o:["b(R) + b(S)","b(R) + t(R)·b(S)","b(R)·b(S)","t(R) + t(S)"],c:1,e:"Scansiono R una volta (<b>b(R)</b> blocchi); per ciascuna delle <b>t(R)</b> tuple di R scansiono S (<b>b(S)</b> blocchi): totale <b>b(R) + t(R)·b(S)</b>. R esterna più piccola = meno costoso."},
 {t:"phys",q:"In un B+-tree con 3 livelli, una ricerca esatta della chiave costa quanti accessi per arrivare alla foglia?",o:["1","3 (radice → intermedio → foglia)","numero di foglie","tutte le tuple"],c:1,e:"Si attraversa un nodo per livello: <b>3 livelli = 3 accessi</b> per raggiungere la foglia. Poi dall'indice si accede alla struttura primaria per leggere la tupla (1 accesso aggiuntivo se sequenziale)."},
 {t:"phys",q:"Con un indice hash primario sulla chiave, recuperare una tupla data la chiave costa circa...",o:["1 accesso (più l'eventuale catena di overflow)","3 accessi","una scansione completa","log₂(n) accessi"],c:0,e:"L'hash porta direttamente al blocco target: <b>~1 accesso</b> (più eventuale catena overflow). Non serve scorrere nulla, è O(1) medio — molto più veloce di un B+-tree per uguaglianza puntuale."},
 {t:"phys",q:"Cosa indica val(A) di un attributo A nelle stime dei costi?",o:["la dimensione di A in byte","il numero di valori distinti di A","il numero di blocchi","il numero di NULL"],c:1,e:"<b>val(A)</b> = numero di <b>valori distinti</b> di A. La selettività di una condizione A = 'valore' è stimata come <b>1/val(A)</b>, assumendo distribuzione uniforme."},
 {t:"phys",q:"Il sort-merge join è efficiente quando...",o:["entrambe le relazioni sono già ordinate sull'attributo di join","le relazioni sono molto piccole","c'è un indice hash su entrambe","non ci sono chiavi primarie"],c:0,e:"Se R e S sono già ordinate sull'attributo di join (o si ammortizza il costo del sort), il <b>sort-merge join</b> scansiona R e S una sola volta: costo ≈ b(R)+b(S). Eccellente per grandi tabelle già ordinate."},
 {t:"phys",q:"Per stimare il numero di blocchi t(R)/t(S) di una selezione con condizione A = v su una tabella di t(R) tuple, si usa...",o:["t(R) / val(A)","val(A) / t(R)","t(R) · val(A)","1"],c:0,e:"Assumendo distribuzione uniforme, la selezione <b>A = v</b> restituisce circa <b>t(R) / val(A)</b> tuple. Ad esempio, se val(deptID) = 10 e t(EMP) = 1000, ci si aspettano ~100 dipendenti per dipartimento."},
 {t:"phys",q:"Perché un indice su un attributo a bassa selettività (es. 'sesso' con 2 valori) è spesso sconsigliato?",o:["Occupa troppo spazio","Recupererebbe ~50% delle tuple: conviene la scansione completa","Non si può creare su attributi non numerici","Non è compatibile con B+-tree"],c:1,e:"Un indice su un attributo con <b>pochi valori distinti</b> restituisce moltissime tuple (es. 50% per sesso). In tal caso il costo dell'indice + lookup è spesso <b>maggiore</b> di una semplice scansione sequenziale."},
 {t:"phys",q:"Un indice denso ha un entry per ogni...",o:["blocco della tabella","valore distinto dell'attributo","tupla della tabella","pagina del B+-tree"],c:2,e:"Un <b>indice denso</b> ha un entry nell'indice per <b>ogni tupla</b> della tabella (anche se più tuple hanno lo stesso valore). Un indice sparso ha entry solo per alcuni valori (es. un entry per blocco)."},
 {t:"phys",q:"Il costo di una scansione completa (full scan) di una tabella di b blocchi è...",o:["1","b","t(R)/b","b²"],c:1,e:"La scansione completa legge <b>tutti i b blocchi</b> della tabella: costo = <b>b</b> I/O. È il caso peggiore per le query con predicati molto selettivi, ma è inevitabile senza indici adeguati."},
 {t:"phys",q:"In un B+-tree, le foglie (leaf nodes) contengono...",o:["Solo puntatori ai figli","I valori delle chiavi con i puntatori alle tuple corrispondenti, collegati da puntatori a catena","Solo i dati effettivi delle tuple","Solo le chiavi, senza puntatori"],c:1,e:"Le <b>foglie del B+-tree</b> contengono le coppie (chiave, puntatore alla tupla) e sono collegate in una <b>lista doppiamente linkata</b>: questo permette scansioni efficienti su range senza risalire alla radice."},
 {t:"phys",q:"Quando si valuta un query plan con caching dei blocchi di una tabella piccola, il costo della seconda scansione di quella tabella è...",o:["uguale alla prima","0 (i blocchi sono già in memoria)","la metà","dipende dal tipo di indice"],c:1,e:"Con <b>caching</b>, se una tabella è abbastanza piccola da stare in memoria, la seconda (e successive) scansione hanno costo <b>0</b>: i blocchi sono già nel buffer. Questo riduce enormemente il costo di join ripetuti."},
 {t:"phys",q:"Quanti accessi I/O servono per trovare le foglie di un B+-tree di livello L, poi leggere N foglie?",o:["N","L + N","L · N","N/L"],c:1,e:"Si pagano <b>L accessi</b> per scendere dalla radice alla prima foglia, poi <b>N accessi</b> per leggere N foglie consecutive (grazie ai puntatori a catena). Totale: <b>L + N</b>."},
 {t:"phys",q:"Uno 'scan & lookup' su un indice secondario per recuperare n tuple sparse potrebbe costare fino a...",o:["n accessi (worst case: una tupla per blocco)","1 accesso","b(R) accessi sempre","n/b(R) accessi"],c:0,e:"Con un indice secondario, ogni puntatore potrebbe portare a un <b>blocco diverso</b>: nel caso peggiore, <b>n accessi</b> per n tuple. Questo può essere peggio della scansione completa se n è grande e le tuple sono sparse."},
 {t:"phys",q:"Il costo di un index-join con un B+-tree di 3 livelli su S, per ogni tupla di R che fa una ricerca in S, è circa...",o:["b(R) + b(S)","b(R) + t(R)·(3 + 1)","3 + t(R)","b(R) · 3"],c:1,e:"Per ogni delle t(R) tuple di R, si fanno <b>3 accessi</b> per scendere il B+-tree + <b>1 accesso</b> alla foglia/dato: <b>b(R) + t(R)·(3+1)</b>. Molto meglio del nested loop quando R è piccola e il join è selettivo."},

 /* ==================== TRIGGERS ==================== */
 {t:"trig",q:"Un trigger di riga (FOR EACH ROW) viene eseguito...",o:["una volta per istruzione SQL","una volta per ogni tupla coinvolta dall'istruzione","una sola volta a fine transazione","mai automaticamente"],c:1,e:"<b>FOR EACH ROW</b> = granularità di riga: il corpo si attiva <b>una volta per ogni tupla</b> modificata dall'istruzione. Al contrario, FOR EACH STATEMENT si attiva una sola volta per tutta l'istruzione, anche se modifica 1000 righe."},
 {t:"trig",q:"La terminazione di un insieme di trigger è garantita se il grafo di attivazione è...",o:["ciclico","aciclico","completo","bipartito"],c:1,e:"Se il <b>grafo di triggering è aciclico</b> la terminazione è <b>garantita</b>: non ci sono sequenze infinite di attivazioni. Con cicli, serve dimostrare che una condizione (WHEN clause o logica interna) li interrompe in un numero finito di passi."},
 {t:"trig",q:"In un trigger AFTER INSERT, come ci si riferisce alla tupla appena inserita?",o:["OLD","NEW","THIS","INSERTED"],c:1,e:"<b>NEW</b> = la nuova tupla (disponibile in INSERT e UPDATE). <b>OLD</b> = la tupla precedente (disponibile in DELETE e UPDATE). In un trigger FOR EACH STATEMENT non ci sono OLD/NEW (agisce sull'intera istruzione)."},
 {t:"trig",q:"Un trigger BEFORE UPDATE può essere usato per...",o:["Solo notificare un altro sistema","Modificare i valori di NEW prima che vengano scritti nel DB","Leggere OLD e NEW contemporaneamente","Solo fare rollback"],c:1,e:"Un <b>BEFORE trigger</b> si esegue prima della modifica effettiva: può <b>alterare NEW</b> per cambiare i valori che verranno scritti. Utile per validazioni, normalizzazioni automatiche, o calcoli derivati."},
 {t:"trig",q:"In quale ordine vengono eseguiti trigger BEFORE e AFTER sullo stesso evento?",o:["Prima AFTER, poi BEFORE","Prima BEFORE, poi l'operazione DML, poi AFTER","Prima BEFORE e AFTER insieme, poi l'operazione","Dipende dall'ordine di creazione"],c:1,e:"L'ordine standard è: <b>1) BEFORE trigger</b> → <b>2) operazione DML</b> → <b>3) AFTER trigger</b>. I BEFORE possono modificare i dati prima della scrittura; gli AFTER reagiscono alla scrittura già avvenuta."},
 {t:"trig",q:"Quale clausola in un trigger permette di specificare una condizione che dev'essere vera prima che il corpo venga eseguito?",o:["IF","WHERE","WHEN","HAVING"],c:2,e:"La clausola <b>WHEN</b> in un trigger è una condizione booleana: se è FALSE il corpo non viene eseguito. Si usa per evitare attivazioni inutili e può bloccare cicli di trigger (ad es. WHEN NEW.val <> OLD.val)."},
 {t:"trig",q:"In un trigger che mantiene una tabella aggregata (es. somma stipendi per dipartimento), su quali eventi bisogna agire?",o:["Solo INSERT su EMP","INSERT, DELETE, UPDATE su EMP (e UPDATE del campo rilevante)","Solo UPDATE su DEPT","Solo DELETE su EMP"],c:1,e:"Per mantenere <b>aggiornata la somma</b>, bisogna reagire a <b>INSERT</b> (nuova tupla aggiunge al totale), <b>DELETE</b> (toglie dal totale), e <b>UPDATE del campo rilevante</b> (sottrago vecchio, aggiungo nuovo). Dimenticare un evento rompe la consistenza."},
 {t:"trig",q:"Il trigger seguente ha un potenziale problema: CREATE TRIGGER T AFTER UPDATE ON EMP FOR EACH ROW BEGIN UPDATE EMP SET sal=sal+1 WHERE id=NEW.id; END. Qual è?",o:["Usa NEW erroneamente","Causa un loop infinito: il trigger aggiorna EMP che ri-attiva il trigger","Non ha WHEN clause (errore sintattico)","Non può usare UPDATE nel body"],c:1,e:"Il trigger reagisce a UPDATE su EMP e nel body fa ancora UPDATE su EMP → si riattiva → <b>loop infinito</b>. Si corregge aggiungendo una clausola WHEN che interrompe il ciclo, es. WHEN NEW.sal <> OLD.sal + 1."},
 {t:"trig",q:"Un trigger FOR EACH STATEMENT senza WHEN viene eseguito quante volte per un'istruzione DELETE che cancella 500 righe?",o:["500","1","0","dipende dalla tabella"],c:1,e:"<b>FOR EACH STATEMENT</b> si attiva <b>una sola volta</b> per l'intera istruzione, indipendentemente dal numero di righe coinvolte. Non ha accesso a OLD/NEW delle singole righe."},
 {t:"trig",q:"In un trigger AFTER DELETE su EMP (FOR EACH ROW), il valore OLD.deptID si riferisce a...",o:["Il dipartimento attuale dell'impiegato eliminato","Niente, OLD non esiste nei DELETE trigger","Il dipartimento dell'impiegato prima dell'eliminazione (la riga che stai cancellando)","Il dipartimento di un impiegato a caso"],c:2,e:"In un trigger DELETE, <b>OLD</b> contiene i valori della riga <b>che viene eliminata</b>. Non esiste NEW in un DELETE trigger. Quindi OLD.deptID è il dipartimento dell'impiegato che stiamo rimuovendo."},
 {t:"trig",q:"Perché è importante analizzare la terminazione dei trigger prima di metterli in produzione?",o:["Per ottimizzare gli indici","Per evitare sequenze infinite di attivazioni che mandano in loop il DB","Per rispettare le foreign key","Per garantire il WAL"],c:1,e:"<b>Trigger che si attivano a vicenda</b> possono creare sequenze di attivazioni infinite, mettendo il DB in un loop infinito. L'analisi del grafo di triggering (aciclico = terminazione garantita) è fondamentale per la correttezza."},

 /* ==================== JPA ==================== */
 {t:"jpa",q:"Quale annotazione marca la chiave primaria di un'entità JPA?",o:["@Key","@Id","@PrimaryKey","@Identity"],c:1,e:"<b>@Id</b> indica l'identificatore dell'entità. Senza @Id, JPA non sa come gestire l'identità dell'oggetto nel DB. Si accompagna tipicamente con <b>@GeneratedValue</b> per la generazione automatica dell'ID."},
 {t:"jpa",q:"Con fetch LAZY su una relazione, i dati collegati vengono caricati...",o:["subito insieme all'entità","solo quando vi si accede davvero","mai","solo al commit"],c:1,e:"<b>LAZY</b> = caricamento differito: la collezione/entità collegata si carica al primo accesso (tramite il getter), non subito. Evita di caricare tutto il DB in memoria, ma attenzione alla <i>LazyInitializationException</i> fuori dalla sessione."},
 {t:"jpa",q:"Qual è la strategia di fetch di default per una relazione @OneToMany?",o:["EAGER","LAZY","non ha default","NONE"],c:1,e:"Le relazioni <b>-to-many (@OneToMany, @ManyToMany)</b> sono <b>LAZY</b> di default. Le <b>-to-one (@ManyToOne, @OneToOne)</b> sono <b>EAGER</b> di default. Questo perché caricare una collezione intera potrebbe essere molto costoso."},
 {t:"jpa",q:"Il persistence context garantisce che, nella stessa sessione, una data entità...",o:["sia duplicata in più copie","sia rappresentata da un'unica istanza gestita (identity guarantee)","non sia modificabile","sia sempre detached"],c:1,e:"Il <b>persistence context</b> è una cache di primo livello: una stessa riga del DB = <b>una sola istanza Java</b> gestita. JPA traccia le modifiche automaticamente (dirty checking) e le sincronizza al flush/commit."},
 {t:"jpa",q:"In una relazione @OneToMany / @ManyToOne bidirezionale, chi è il 'lato owner' della relazione?",o:["Il lato @OneToMany","Il lato @ManyToOne (quello con la foreign key nel DB)","Entrambi sono owner","Il lato con cascade"],c:1,e:"Il <b>lato owner</b> è quello che possiede la <b>foreign key nel DB</b>: tipicamente il lato <b>@ManyToOne</b>. Solo le modifiche fatte sull'owner vengono scritte nel DB. Il lato @OneToMany usa <b>mappedBy</b> per indicare che non è owner."},
 {t:"jpa",q:"Cosa fa CascadeType.PERSIST?",o:["Cancella le entità collegate quando l'entità padre viene cancellata","Persiste automaticamente le entità collegate quando si persiste l'entità padre","Carica tutte le entità collegate in memoria","Non fa nulla"],c:1,e:"<b>CascadeType.PERSIST</b>: quando fai em.persist(padre), JPA fa automaticamente persist su tutte le entità collegate nella relazione. Evita di dover chiamare persist su ogni entità figlia manualmente."},
 {t:"jpa",q:"Cosa fa l'annotazione @JoinColumn(name='dept_id')?",o:["Crea un indice su dept_id","Specifica il nome della colonna foreign key nel DB per questa relazione","Indica che dept_id è la chiave primaria","Forza il caricamento EAGER"],c:1,e:"<b>@JoinColumn(name='dept_id')</b> specifica il nome della colonna della <b>foreign key nel DB</b> che implementa la relazione. Senza di essa, JPA usa una convenzione di default per il nome della colonna."},
 {t:"jpa",q:"Cos'è un'entità in stato 'detached' in JPA?",o:["Un'entità mai salvata","Un'entità che era gestita dal persistence context ma ora non lo è più (es. sessione chiusa)","Un'entità con @Transient","Un'entità eliminata dal DB"],c:1,e:"Un'entità <b>detached</b> esiste come oggetto Java ma non è più sotto il controllo del persistence context. Le sue modifiche <b>non vengono</b> automaticamente sincronizzate al DB. Si può ri-attaccarla con em.merge()."},
 {t:"jpa",q:"In JPQL, la query 'SELECT e FROM Employee e WHERE e.department.name = :deptName' funziona grazie a...",o:["SQL diretto","Navigazione dei campi dell'entità tramite il punto (.)","Un indice obbligatorio","JOIN FETCH sempre implicito"],c:1,e:"<b>JPQL</b> naviga le relazioni tra entità usando il <b>punto (.)</b>: e.department.name accede al campo name dell'entità Department collegata a Employee. JPA genera automaticamente la JOIN SQL necessaria."},
 {t:"jpa",q:"Quale dei seguenti metodi dell'EntityManager persiste un'entità nuova nel DB?",o:["em.save(e)","em.add(e)","em.persist(e)","em.insert(e)"],c:2,e:"L'API standard JPA usa <b>em.persist(e)</b> per rendere un'entità <i>managed</i> e pianificarne l'INSERT nel DB al prossimo flush. Non esiste em.save() in JPA puro (è un metodo di Spring Data JPA)."},
 {t:"jpa",q:"Cosa succede se si modifica un campo di un'entità managed e non si chiama em.persist() di nuovo?",o:["La modifica viene persa","La modifica viene automaticamente salvata al flush/commit (dirty checking)","Si lancia un'eccezione","Bisogna chiamare em.update()"],c:1,e:"Il <b>dirty checking</b>: JPA tiene traccia dello stato originale di ogni entità managed. Al flush, confronta lo stato attuale con quello originale e genera automaticamente gli UPDATE necessari. Non serve chiamare nulla manualmente."},
 {t:"jpa",q:"L'annotazione @ManyToMany in JPA richiede tipicamente...",o:["Una tabella di join nel DB con due foreign key","Una colonna aggiuntiva in una delle due tabelle","Un campo @Id speciale","Nessuna struttura aggiuntiva nel DB"],c:0,e:"Una relazione <b>@ManyToMany</b> si implementa nel DB con una <b>tabella di join</b> (junction table) che ha due foreign key, una verso ciascuna delle entità. JPA la gestisce con @JoinTable."},
 {t:"jpa",q:"Cosa fa CascadeType.ALL?",o:["Applica solo PERSIST e MERGE","Applica tutti i tipi di cascade: PERSIST, MERGE, REMOVE, REFRESH, DETACH","Sincronizza subito i dati","Carica EAGER tutte le relazioni"],c:1,e:"<b>CascadeType.ALL</b> combina <b>PERSIST + MERGE + REMOVE + REFRESH + DETACH</b>: tutte le operazioni sull'entità padre si propagano alle entità figlie collegate. Usare ALL con cautela: può causare cancellazioni inattese."},

 /* ==================== TEORIA ==================== */
 {t:"theo",q:"Le proprietà ACID sono Atomicità, Consistenza, Isolamento e...",o:["Durabilità","Disponibilità","Affidabilità","Distribuzione"],c:0,e:"<b>ACID</b> = Atomicity, Consistency, Isolation, <b>Durability</b>. Durabilità: gli effetti di un commit sopravvivono ai guasti hardware. Garantita dal WAL (Write-Ahead Logging) e dai checkpoint."},
 {t:"theo",q:"Quale livello di isolamento elimina i dirty read ma può ancora avere non-repeatable read?",o:["Read Uncommitted","Read Committed","Serializable","Snapshot"],c:1,e:"<b>Read Committed</b>: legge solo dati committati (no dirty read), ma non blocca le letture ripetute — un'altra transazione può modificare il dato tra due letture della stessa transazione (non-repeatable read)."},
 {t:"theo",q:"Il protocollo 2-phase commit (2PC) serve a...",o:["gestire i lock locali","coordinare un commit atomico tra più nodi in un DB distribuito","costruire gli indici","ordinare le tuple"],c:1,e:"<b>2PC</b>: il coordinatore invia PREPARE a tutti i partecipanti, raccoglie i voti (YES/NO), e decide COMMIT o ABORT. Garantisce atomicità distribuita: o tutti committano o nessuno."},
 {t:"theo",q:"Nel logging, la regola WAL (Write-Ahead Logging) impone di...",o:["scrivere i dati prima del log","scrivere il record di log prima di scrivere il dato su disco","non usare il log","scrivere solo al commit"],c:1,e:"<b>WAL</b>: il record di log va su disco <b>prima</b> della modifica del dato corrispondente. Così in caso di crash, il recovery può UNDO/REDO le transazioni usando il log, anche se i dati non erano ancora su disco."},
 {t:"theo",q:"Un phantom read si verifica quando...",o:["leggo un dato mai scritto","rilevo nella stessa transazione un numero diverso di righe pur con lo stesso predicato (perché un'altra transazione ha inserito/cancellato righe)","scrivo senza leggere","leggo dati sporchi"],c:1,e:"<b>Phantom read</b>: T1 esegue due volte SELECT con lo stesso WHERE e ottiene risultati diversi perché T2 ha inserito/eliminato righe nel mezzo. Si previene solo col livello SERIALIZABLE."},
 {t:"theo",q:"In recovery, l'operazione REDO si usa per...",o:["annullare le modifiche di una transazione abortita","riapplicare le modifiche di una transazione committata che potrebbe non essere su disco","trovare i deadlock","calcolare il checkpoint"],c:1,e:"<b>REDO</b>: riapplica le operazioni di una transazione <i>committata</i> i cui dati potrebbero non essere stati scritti su disco prima del crash. Garantisce la durabilità del commit."},
 {t:"theo",q:"In recovery, l'operazione UNDO si usa per...",o:["riapplicare le modifiche di una transazione committata","annullare le modifiche di una transazione non committata al momento del crash","aggiornare gli indici","fare backup"],c:1,e:"<b>UNDO</b>: annulla le modifiche di una transazione che era <i>attiva</i> (non committata) al momento del crash. Necessario per l'Atomicità: come se la transazione non fosse mai avvenuta."},
 {t:"theo",q:"Il livello di isolamento READ UNCOMMITTED permette di leggere...",o:["Solo dati committati","Dati non ancora committati ('dirty data')","Solo snapshot al momento del begin","Nessun dato da altre transazioni"],c:1,e:"<b>READ UNCOMMITTED</b>: il livello più basso — legge anche modifiche non committate ('dirty reads'). Massima performance, minima correttezza. Quasi mai usato in produzione."},
 {t:"theo",q:"Il teorema CAP afferma che un sistema distribuito non può garantire simultaneamente...",o:["Consistenza, Disponibilità, Tolleranza alle partizioni (tutti e tre)","Atomicità, Consistenza, Durabilità","Velocità, Scalabilità, Sicurezza","Replicazione, Sharding, Logging"],c:0,e:"Il <b>teorema CAP</b>: un sistema distribuito può garantire al massimo 2 delle 3 proprietà: <b>C</b>onsistency (tutti i nodi vedono gli stessi dati), <b>A</b>vailability (ogni richiesta riceve risposta), <b>P</b>artition tolerance (funziona anche se la rete è partizionata)."},
 {t:"theo",q:"Un checkpoint nel log serve a...",o:["Trovare deadlock","Limitare il lavoro di recovery: dopo un checkpoint non serve rileggere il log da capo","Creare un backup incrementale","Eliminare le transazioni attive"],c:1,e:"Il <b>checkpoint</b> scrive su disco tutte le pagine modificate e un record nel log. In caso di crash, il recovery ricomincia dall'ultimo checkpoint, non dall'inizio del log — riducendo enormemente il tempo di ripresa."},
];


const KEY="db2_quiz_v1";
let S={xp:0,best:0,stats:{}};
try{const s=localStorage.getItem(KEY);if(s)S=Object.assign(S,JSON.parse(s));}catch(e){}
Object.keys(TOPICS).forEach(t=>{if(!S.stats[t])S.stats[t]={ans:0,ok:0};});
function save(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}}

const LV_TITLES=["Matricola","Studente","Smanettone","Praticante DB","Esperto","Veterano TDE","Maestro","Boss del TDE"];
function levelOf(xp){return Math.floor(xp/120)+1;}
function donut(frac,size,thick,color,label){
  const r=(size-thick)/2,c=2*Math.PI*r,len=frac*c;
  return `<div class="donut-wrap" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#3a2e22" stroke-width="${thick}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${thick}" stroke-linecap="round"
        stroke-dasharray="${len.toFixed(2)} ${(c-len).toFixed(2)}" transform="rotate(-90 ${size/2} ${size/2})"/>
    </svg><div class="donut-center"><span class="pc" style="font-size:${size*.3}px;color:${color}">${label}</span></div></div>`;
}

function renderHome(){
  const lv=levelOf(S.xp),inLv=S.xp%120,title=LV_TITLES[Math.min(lv-1,LV_TITLES.length-1)];
  document.getElementById("lvlNum").textContent=lv;
  document.getElementById("lvlTitle").textContent=title;
  document.getElementById("lvlSub").textContent=`${inLv} / 120 XP al livello ${lv+1}  ·  ${S.xp} XP totali`;
  document.getElementById("xpFill").style.width=(inLv/120*100)+"%";

  let ans=0,ok=0;Object.values(S.stats).forEach(s=>{ans+=s.ans;ok+=s.ok;});
  const acc=ans?Math.round(ok/ans*100):0;
  document.getElementById("accDonut").innerHTML=donut(ans?ok/ans:0,58,9,"var(--ok)",acc+"%");
  document.getElementById("accV").innerHTML=ans?acc+"%":"—";
  document.getElementById("ansV").textContent=ans;
  document.getElementById("bestV").innerHTML=S.best+' <small>🔥</small>';

  document.getElementById("mastery").innerHTML=Object.keys(TOPICS).map(t=>{
    const s=S.stats[t],a=s.ans,o=s.ok,p=a?Math.round(o/a*100):0,col=TOPICS[t].color;
    return `<div class="mrow">
      <div class="nm"><i class="dot" style="background:${col}"></i>${TOPICS[t].name}</div>
      <div class="mtrack"><i style="width:${p}%;background:${col}"></i></div>
      <div class="pct">${a?p+"% · "+a:"—"}</div></div>`;
  }).join("");

  let pg=`<button class="pbtn big" onclick="start('mix')"><span class="lab">⚡ Quiz misto — 10 domande</span><span class="meta2">Un mix di tutti gli argomenti. Il modo migliore per allenarti.</span></button>`;
  pg+=Object.keys(TOPICS).map(t=>{
    const n=Q.filter(q=>q.t===t).length;
    return `<button class="pbtn" onclick="start('${t}')"><span class="lab"><i class="dot" style="background:${TOPICS[t].color}"></i>${TOPICS[t].name}</span><span class="meta2">${n} domande</span></button>`;
  }).join("");
  document.getElementById("playgrid").innerHTML=pg;
  document.getElementById("fnote").textContent=`${Q.length} domande in archivio · progressi salvati su questo dispositivo`;
}

// SESSION
let SESS=null;
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function start(mode){
  let pool=mode==='mix'?shuffle(Q).slice(0,10):shuffle(Q.filter(q=>q.t===mode));
  SESS={mode,list:pool.map(q=>{
    const idx=q.o.map((_,i)=>i),sh=shuffle(idx),correctText=q.o[q.c];
    return {q,opts:sh.map(i=>q.o[i]),correctText};
  }),i:0,ok:0,xpGain:0,streak:0};
  show('quiz');renderQ();
}
function show(id){["home","quiz","result"].forEach(s=>document.getElementById(s).classList.toggle("hide",s!==id));window.scrollTo(0,0);}
function goHome(){renderHome();show('home');}

function renderQ(){
  const cur=SESS.list[SESS.i],q=cur.q,topic=TOPICS[q.t];
  document.getElementById("qProg").style.width=(SESS.i/SESS.list.length*100)+"%";
  document.getElementById("qCount").textContent=`${SESS.i+1}/${SESS.list.length}`;
  document.getElementById("qStreak").innerHTML=`🔥 ${SESS.streak}`;
  const tag=document.getElementById("qTag");
  tag.style.background=topic.color.replace('var(--','rgba(').replace(')',',.18)');
  tag.style.color=topic.color;tag.innerHTML=`<i class="dot" style="background:${topic.color}"></i>${topic.name}`;
  document.getElementById("qText").textContent=q.q;
  const ow=document.getElementById("qOpts");ow.innerHTML="";
  cur.opts.forEach(txt=>{
    const b=document.createElement("button");b.className="opt";b.textContent=txt;
    b.onclick=()=>answer(b,txt,cur);ow.appendChild(b);
  });
  const ex=document.getElementById("qExpl");ex.className="expl";ex.innerHTML=q.e;
  document.getElementById("qNext").className="nextbtn";
  document.getElementById("qNext").textContent=SESS.i===SESS.list.length-1?"Vedi risultati →":"Avanti →";
}
function answer(btn,txt,cur){
  const opts=document.querySelectorAll("#qOpts .opt");opts.forEach(o=>o.disabled=true);
  const right=txt===cur.correctText;
  S.stats[cur.q.t].ans++;
  if(right){
    btn.classList.add("correct");btn.innerHTML+='<span class="mk">✓</span>';
    SESS.ok++;S.stats[cur.q.t].ok++;SESS.streak++;if(SESS.streak>S.best)S.best=SESS.streak;
    const gain=10+Math.min(SESS.streak-1,5)*2;SESS.xpGain+=gain;S.xp+=gain;
    floatXP("+"+gain);
  }else{
    btn.classList.add("wrong");btn.innerHTML+='<span class="mk">✗</span>';
    document.querySelector("#quiz .qcard").classList.add("shake");
    setTimeout(()=>document.querySelector("#quiz .qcard").classList.remove("shake"),400);
    opts.forEach(o=>{if(o.textContent.replace('✓','').replace('✗','')===cur.correctText)o.classList.add("correct");});
    SESS.streak=0;
  }
  document.getElementById("qStreak").innerHTML=`🔥 ${SESS.streak}`;
  document.getElementById("qExpl").classList.add("show");
  document.getElementById("qNext").classList.add("show");
  save();
}
function floatXP(txt){const f=document.getElementById("floatxp");f.textContent=txt+" XP";f.classList.remove("go");void f.offsetWidth;f.classList.add("go");}
function nextQ(){SESS.i++;if(SESS.i>=SESS.list.length)return showResult();renderQ();}
function replay(){start(SESS.mode);}

function showResult(){
  const n=SESS.list.length,acc=Math.round(SESS.ok/n*100);
  document.getElementById("rScore").textContent=`${SESS.ok}/${n}`;
  document.getElementById("rXp").textContent=`+${SESS.xpGain}`;
  document.getElementById("rAcc").textContent=`${acc}%`;
  let emoji,title,msg;
  if(acc===100){emoji="🏆";title="Perfetto!";msg="Tutte giuste. Sei pronto per questo argomento.";}
  else if(acc>=70){emoji="🎉";title="Bel lavoro!";msg="Buona padronanza — rivedi i pochi punti incerti e sei a posto.";}
  else if(acc>=40){emoji="💪";title="Ci sei quasi";msg="Le basi ci sono. Ripeti questa sessione per consolidare.";}
  else{emoji="📚";title="Da ripassare";msg="Niente paura: rileggi le spiegazioni e riprova, migliorerai in fretta.";}
  document.getElementById("rEmoji").textContent=emoji;
  document.getElementById("rTitle").textContent=title;
  document.getElementById("rMsg").textContent=msg;
  show('result');
}
function resetAll(){if(confirm("Azzerare tutte le statistiche del quiz su questo dispositivo?")){S={xp:0,best:0,stats:{}};Object.keys(TOPICS).forEach(t=>S.stats[t]={ans:0,ok:0});save();renderHome();}}

renderHome();
</script>
</body>
</html>
