<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Database 2 — TDE Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Spline+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f4efe4; --paper2:#faf7ef; --card:#fffdf8; --ink:#241f18; --ink-soft:#6b6255;
    --line:#e4dccb; --line2:#d8cfba;
    --d-low:#2f9e63; --d-mid:#e0992a; --d-high:#cf3a2c; --d-none:#aeb7c4; --todo:#ddd4c2;
    --rank:#c2410c; --conc:#2257c4; --trig:#0d8a6a; --phys:#7b4ad1; --jpa:#a8551b; --theo:#5a6577;
    --shadow:0 1px 2px rgba(50,40,20,.05),0 12px 28px -14px rgba(70,55,25,.22);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{font-family:'Spline Sans',system-ui,sans-serif;background:var(--paper);color:var(--ink);
    line-height:1.5;padding:clamp(16px,4vw,48px);
    background-image:radial-gradient(circle at 12% 18%,rgba(194,65,12,.04),transparent 38%),radial-gradient(circle at 88% 8%,rgba(34,87,196,.045),transparent 42%);
    min-height:100vh;}
  .wrap{max-width:1080px;margin:0 auto}
  header{margin-bottom:clamp(22px,4vw,40px)}
  .kicker{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:10px}
  h1{font-family:'Fraunces',serif;font-weight:900;font-size:clamp(34px,8vw,62px);line-height:.96;letter-spacing:-.02em}
  h1 em{font-style:italic;font-weight:400;color:var(--rank)}
  .sub{color:var(--ink-soft);margin-top:12px;max-width:48ch;font-size:15px}
  .hbtns{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
  .hbtn{font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;
    padding:7px 14px;border-radius:10px;border:1px solid var(--line2);background:var(--card);
    color:var(--ink-soft);text-decoration:none;transition:border-color .15s,color .15s}
  .hbtn:hover{border-color:var(--conc);color:var(--conc)}
  .hbtn.primary{background:var(--conc);border-color:var(--conc);color:#fff}
  .hbtn.primary:hover{opacity:.88;color:#fff}

  .grid-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:28px 0}
  @media(max-width:720px){.grid-stats{grid-template-columns:1fr;gap:12px}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}
  .stat{padding:20px;display:flex;align-items:center;gap:18px}
  .stat .meta{flex:1;min-width:0}
  .stat .t{font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft)}
  .stat .big{font-family:'Fraunces',serif;font-weight:600;font-size:30px;line-height:1.1;margin-top:2px}
  .stat .leg{margin-top:8px;display:flex;flex-direction:column;gap:3px}
  .stat .leg span{font-size:12px;color:var(--ink-soft);display:flex;align-items:center;gap:7px}
  .dot{width:9px;height:9px;border-radius:3px;flex:none}

  .section-h{font-family:'Fraunces',serif;font-weight:600;font-size:22px;margin:36px 0 16px;display:flex;align-items:baseline;gap:12px}
  .section-h .n{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-soft);letter-spacing:.1em}
  .section-h .hint{font-family:'Spline Sans';font-size:12.5px;font-weight:400;color:var(--ink-soft);margin-left:auto}

  /* TOPIC CARDS */
  .grid-topics{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  @media(max-width:720px){.grid-topics{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:420px){.grid-topics{grid-template-columns:1fr}}
  .topic{padding:16px;display:flex;gap:14px;align-items:center;position:relative;overflow:hidden;
    cursor:pointer;transition:transform .12s,box-shadow .15s;-webkit-tap-highlight-color:transparent}
  .topic:hover{transform:translateY(-2px);box-shadow:var(--shadow),0 4px 16px -8px rgba(0,0,0,.15)}
  .topic.hot{box-shadow:var(--shadow),inset 4px 0 0 var(--d-high)}
  .topic.active{box-shadow:var(--shadow),0 0 0 2px var(--tc,var(--conc))}
  .topic .meta{flex:1;min-width:0}
  .topic .name{font-weight:600;font-size:14.5px;display:flex;align-items:center;gap:8px}
  .topic .frac{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-soft);margin-top:3px}
  .topic .mix{font-size:11.5px;margin-top:6px;display:flex;gap:9px;flex-wrap:wrap}
  .topic .mix b{font-weight:600}
  .topic .guide-hint{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--ink-soft);margin-top:8px;display:flex;align-items:center;gap:5px}
  .topic .guide-hint .arr{transition:transform .2s}
  .topic.active .guide-hint .arr{transform:rotate(90deg)}

  /* GUIDE PANEL */
  .gpanel{display:none;margin:6px 0 0;border-radius:18px;overflow:hidden}
  .gpanel.open{display:block;animation:gslide .22s ease}
  @keyframes gslide{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
  .gpanel-inner{padding:22px 24px;position:relative}
  .gpanel-close{position:absolute;top:16px;right:18px;background:none;border:1px solid var(--line2);
    color:var(--ink-soft);border-radius:8px;padding:5px 11px;cursor:pointer;font-size:11.5px;
    font-family:'IBM Plex Mono',monospace;letter-spacing:.08em;text-transform:uppercase;transition:border-color .15s}
  .gpanel-close:hover{border-color:var(--d-high);color:var(--d-high)}
  .ghead{display:flex;align-items:center;gap:12px;margin-bottom:18px;padding-right:100px}
  .ghead h2{font-family:'Fraunces',serif;font-weight:700;font-size:22px}
  .ghead .gtopic-dot{width:12px;height:12px;border-radius:4px;flex:none}

  /* TABS */
  .gtabs{display:flex;gap:7px;margin-bottom:20px;flex-wrap:wrap;border-bottom:1px solid var(--line);padding-bottom:12px}
  .gtab{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;
    padding:5px 12px;border-radius:20px;border:1px solid var(--line2);background:var(--paper2);
    color:var(--ink-soft);cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
  .gtab:hover{border-color:var(--ink-soft)}
  .gtab.active{color:#fff;border-color:transparent}
  .gsection{display:none}.gsection.active{display:block}

  /* GUIDE CONTENT */
  .gsteps{counter-reset:gs;margin:12px 0}
  .gstep{display:flex;gap:14px;margin-bottom:18px;align-items:flex-start}
  .gstep-n{counter-increment:gs;width:28px;height:28px;border-radius:9px;flex:none;margin-top:1px;
    display:flex;align-items:center;justify-content:center;
    font-family:'Fraunces',serif;font-weight:900;font-size:14px;color:#fff}
  .gstep-n::before{content:counter(gs)}
  .gstep-b{flex:1}
  .gstep-b strong{display:block;font-size:14.5px;font-weight:600;margin-bottom:4px}
  .gstep-b p{font-size:13.5px;color:var(--ink-soft);margin:0;line-height:1.6}
  .gstep-b p b{color:var(--ink)}
  .gbox{border-radius:10px;padding:13px 15px;margin:10px 0;font-size:13.5px;line-height:1.6}
  .gbox.ex{background:rgba(47,158,99,.07);border:1px solid rgba(47,158,99,.22)}
  .gbox.warn{background:rgba(224,153,42,.07);border:1px solid rgba(224,153,42,.22)}
  .gbox.info{background:rgba(34,87,196,.06);border:1px solid rgba(34,87,196,.2)}
  .gbox.danger{background:rgba(207,58,44,.06);border:1px solid rgba(207,58,44,.2)}
  .gbox-label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;margin-bottom:7px}
  .gbox.ex .gbox-label{color:var(--d-low)}.gbox.warn .gbox-label{color:var(--d-mid)}
  .gbox.info .gbox-label{color:var(--conc)}.gbox.danger .gbox-label{color:var(--d-high)}
  .gbox p{margin:0;color:var(--ink-soft)}.gbox p b{color:var(--ink)}
  .gbox ul{padding-left:18px;color:var(--ink-soft)}.gbox ul li{margin-bottom:4px}
  .gtbl{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px}
  .gtbl th{background:var(--paper);padding:7px 11px;text-align:left;font-weight:600;color:var(--ink-soft);border:1px solid var(--line);font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase}
  .gtbl td{padding:7px 11px;border:1px solid var(--line)}
  .gtbl tr:nth-child(even) td{background:var(--paper2)}
  .gtbl .ok{color:var(--d-low);font-weight:700}.gtbl .no{color:var(--d-high);font-weight:700}.gtbl .hl{color:var(--d-mid);font-weight:700}
  .gcode{font-family:'IBM Plex Mono',monospace;font-size:12px;background:var(--paper2);border:1px solid var(--line);
    border-radius:9px;padding:13px 15px;margin:10px 0;line-height:1.75;white-space:pre-wrap;overflow-x:auto;color:var(--ink)}
  .kw{color:var(--conc);font-weight:700}.gcm{color:var(--ink-soft)}.gstr{color:var(--d-low)}.ghl{color:var(--jpa)}
  .gdivider{border:none;border-top:1px solid var(--line);margin:18px 0}
  .gformula{font-family:'IBM Plex Mono',monospace;font-size:12.5px;background:var(--paper2);border:1px solid var(--line);
    border-radius:9px;padding:12px 14px;margin:10px 0;color:var(--d-high);line-height:1.7}
  h3.gsub{font-family:'Fraunces',serif;font-weight:600;font-size:16px;margin:18px 0 8px;color:var(--ink)}

  .review{padding:18px 20px}
  .review .row{display:flex;align-items:center;gap:11px;padding:9px 0;border-top:1px solid var(--line)}
  .review .row:first-child{border-top:none}
  .review .badge{font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;padding:3px 9px;border-radius:20px;color:#fff;flex:none}
  .review .when{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-soft);flex:none;width:92px}
  .review .what{flex:1;font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px;min-width:0}
  .review .empty{color:var(--ink-soft);font-size:14px;text-align:center;padding:10px 0}

  .tde{margin-bottom:12px;overflow:hidden}
  .tde-head{padding:15px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;user-select:none}
  .tde-head .date{font-family:'Fraunces',serif;font-weight:600;font-size:17px}
  .tde-head .pill{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-soft);background:var(--paper);border:1px solid var(--line);padding:2px 9px;border-radius:20px}
  .tde-head .spacer{flex:1}
  .bar{width:96px;height:7px;border-radius:6px;background:var(--todo);overflow:hidden;flex:none;display:flex}
  .bar i{display:block;height:100%;transition:width .4s cubic-bezier(.2,.8,.2,1)}
  .chev{transition:transform .25s;color:var(--ink-soft);font-size:13px}
  .tde.open .chev{transform:rotate(90deg)}
  .ex-list{display:none;border-top:1px solid var(--line);padding:6px 10px 12px}
  .tde.open .ex-list{display:block}
  .ex{display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:12px;flex-wrap:wrap}
  .ex:hover{background:var(--paper2)}
  .ex .lt{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-soft);width:18px;flex:none}
  .ex .ty{flex:1 1 130px;font-size:14px;display:flex;align-items:center;gap:8px;min-width:0}
  .ex .ty b{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ctrls{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .toggle{font-family:'Spline Sans',sans-serif;font-size:12px;font-weight:500;border:1px solid var(--line2);background:var(--paper2);color:var(--ink-soft);
    padding:5px 11px;border-radius:20px;cursor:pointer;transition:all .15s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
  .toggle:active{transform:scale(.95)}
  .toggle.on-done{background:var(--ink);border-color:var(--ink);color:#fff}
  .diffset{display:flex;gap:4px}
  .diffset.dis{opacity:.35;pointer-events:none}
  .dpill{font-size:11.5px;font-weight:600;border:1px solid var(--line2);background:var(--paper2);color:var(--ink-soft);
    padding:5px 10px;border-radius:20px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
  .dpill:active{transform:scale(.95)}
  .dpill.on.b{background:var(--d-low);border-color:var(--d-low);color:#fff}
  .dpill.on.m{background:var(--d-mid);border-color:var(--d-mid);color:#fff}
  .dpill.on.a{background:var(--d-high);border-color:var(--d-high);color:#fff}
  .ex.b{background:linear-gradient(90deg,rgba(47,158,99,.09),transparent)}
  .ex.m{background:linear-gradient(90deg,rgba(224,153,42,.11),transparent)}
  .ex.a{background:linear-gradient(90deg,rgba(207,58,44,.12),transparent)}

  footer{margin-top:34px;text-align:center;color:var(--ink-soft);font-size:12.5px;font-family:'IBM Plex Mono',monospace}
  .reset{margin-top:14px;background:none;border:1px solid var(--line2);color:var(--ink-soft);font-size:11.5px;padding:6px 14px;border-radius:20px;cursor:pointer;font-family:'IBM Plex Mono',monospace}
  .reset:hover{border-color:var(--d-high);color:var(--d-high)}
  svg .donut-seg{transition:stroke-dasharray .5s cubic-bezier(.2,.8,.2,1)}
  .donut-wrap{position:relative;flex:none}
  .donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  .donut-center .pc{font-family:'Fraunces',serif;font-weight:600;line-height:1}
  .donut-center .lb{font-family:'IBM Plex Mono',monospace;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.08em}
  /* ── Obermarck visual diagrams ── */
  .ob-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:12px 0}
  @media(max-width:520px){.ob-grid{grid-template-columns:1fr}}
  .ob-node{background:var(--paper2);border:1.5px solid var(--line);border-radius:10px;padding:10px 12px}
  .ob-node-lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:7px}
  .ob-chain{display:flex;align-items:center;gap:3px;flex-wrap:wrap;margin:3px 0}
  .ob-t{background:var(--conc);color:#fff;border-radius:4px;padding:2px 7px;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;white-space:nowrap}
  .ob-t.nx{background:var(--rank)}
  .ob-t.dead{background:var(--d-high);color:#fff}
  .ob-e{border:1.5px solid #6b7280;color:#8a9bb5;border-radius:4px;padding:2px 7px;font-family:'IBM Plex Mono',monospace;font-size:11px;white-space:nowrap}
  .ob-e.na{border-color:var(--conc);color:var(--conc)}.ob-e.nb{border-color:var(--rank);color:var(--rank)}
  .ob-e.nc{border-color:var(--trig);color:var(--trig)}.ob-e.nd{border-color:var(--jpa);color:var(--jpa)}
  .ob-arr{color:var(--ink-soft);font-size:12px;padding:0 1px}
  .ob-iter{margin:12px 0;border-radius:12px;overflow:hidden;border:1px solid var(--line)}
  .ob-iter-hd{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--paper);border-bottom:1px solid var(--line)}
  .ob-iter-n{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.12em;background:var(--conc);color:#fff;padding:3px 9px;border-radius:20px;text-transform:uppercase;flex:none}
  .ob-iter-ttl{font-size:13px;font-weight:600}
  .ob-iter-body{padding:12px 14px;background:var(--paper2)}
  .ob-send{display:flex;align-items:center;gap:6px;margin:8px 0;flex-wrap:wrap}
  .ob-nd{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;padding:4px 11px;border-radius:6px;color:#fff;flex:none}
  .ob-line{flex:1;display:flex;align-items:center;min-width:16px}
  .ob-line-dash{flex:1;height:2px;opacity:.5}
  .ob-line-tip{font-size:13px;margin-left:-1px}
  .ob-msgs{margin:6px 0 4px;display:flex;flex-direction:column;gap:4px}
  .ob-msg{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .ob-ok{color:var(--d-low);font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600}
  .ob-recv{background:rgba(47,211,152,.07);border:1px solid rgba(47,211,152,.25);border-radius:8px;padding:8px 12px;margin-top:10px}
  .ob-recv-lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--trig);margin-bottom:5px}
  .ob-note{font-size:11.5px;color:var(--ink-soft);margin-top:5px}
  .ob-dl{background:rgba(220,60,60,.10);border:2px solid #e05555;border-radius:10px;padding:12px 16px;margin-top:12px;text-align:center}
  .ob-dl-h{font-family:'Fraunces',serif;font-weight:900;font-size:18px;color:#e05555;margin-bottom:6px}

  /* ── Auth bar ─────────────────────────────────────────── */
  .auth-bar{display:flex;align-items:center;gap:10px;margin-top:14px;flex-wrap:wrap}
  .auth-google-btn{display:flex;align-items:center;gap:7px;font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;padding:7px 14px;
    border-radius:10px;border:1px solid var(--line2);background:var(--card);
    color:var(--ink-soft);cursor:pointer;transition:border-color .15s,color .15s}
  .auth-google-btn:hover{border-color:var(--conc);color:var(--conc)}
  .auth-user{display:flex;align-items:center;gap:9px}
  .auth-avatar{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--line)}
  .auth-name{font-size:13px;color:var(--ink-soft)}
  .auth-logout{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.06em;
    text-transform:uppercase;padding:5px 11px;border-radius:8px;border:1px solid var(--line2);
    background:transparent;color:var(--ink-soft);cursor:pointer;transition:border-color .15s,color .15s}
  .auth-logout:hover{border-color:#e05555;color:#e05555}
  .auth-sync{font-size:11px;color:var(--trig);font-family:'IBM Plex Mono',monospace;letter-spacing:.04em}

</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">Politecnico · Basi di Dati 2</div>
    <h1>TDE <em>Tracker</em></h1>
    <p class="sub">Segna <b>Fatto</b> e la <b>difficoltà</b> per ogni esercizio. Clicca su un argomento per aprire la guida passo-passo.</p>
    <div class="hbtns">
      <a href="quiz.html" class="hbtn primary">⚡ Quiz Arcade</a>
    </div>
    <div class="auth-bar" id="auth-bar">
      <span style="font-size:12px;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace">Caricamento...</span>
    </div>
  </header>

  <div class="grid-stats" id="stats"></div>

  <div class="section-h"><span class="n">01</span> Difficoltà per argomento<span class="hint">clicca per la guida ↓</span></div>
  <div class="grid-topics" id="topics"></div>
  <div class="card gpanel" id="gpanel">
    <div class="gpanel-inner" id="gpanel-inner">
      <button class="gpanel-close" onclick="closeGuide()">✕ chiudi</button>
      <div id="gpanel-content"></div>
    </div>
  </div>

  <div class="section-h"><span class="n">02</span> Da ripassare<span class="hint">esercizi a difficoltà media / alta</span></div>
  <div class="card review" id="review"></div>

  <div class="section-h"><span class="n">03</span> Tutti i TDE</div>
  <div id="tdelist"></div>

  <footer>
    <div id="fnote"></div>
    <button class="reset" onclick="resetAll()">↺ Azzera progressi</button>
  </footer>
</div>

<!-- Firebase compat SDKs (loaded before main script) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const TYPE_COLORS={"Ranking":"var(--rank)","Concurrency control":"var(--conc)","Triggers":"var(--trig)","Physical DB":"var(--phys)","JPA":"var(--jpa)","Theory":"var(--theo)"};
const TYPE_COLORS_HEX={"Ranking":"#c2410c","Concurrency control":"#2257c4","Triggers":"#0d8a6a","Physical DB":"#7b4ad1","JPA":"#a8551b","Theory":"#5a6577"};
const DIFF_COLORS={b:"var(--d-low)",m:"var(--d-mid)",a:"var(--d-high)"};
const DIFF_LABEL={b:"Bassa",m:"Media",a:"Alta"};

const KEY="db2_tde_tracker_v2";
let STATE={};
let currentUser=null;
let _db=null;

function save(){
  if(currentUser&&_db){
    _db.collection("users").doc(currentUser.uid).set({state:STATE}).catch(console.error);
  } else {
    try{localStorage.setItem(KEY,JSON.stringify(STATE));}catch(e){}
  }
}
function st(id){return STATE[id]||{done:false,diff:null};}
function setDone(id){const s=st(id);const n=!s.done;STATE[id]={done:n,diff:n?s.diff:null};save();renderAll();}
function setDiff(id,lv){const s=st(id);const nd=s.diff===lv?null:lv;STATE[id]={done:true,diff:nd};save();renderAll();}
function resetAll(){
  const msg=currentUser?"Azzerare tutti i progressi su Firebase?":"Azzerare tutti i progressi su questo dispositivo?";
  if(confirm(msg)){STATE={};save();renderAll();}
}

<h3 class="gsub">Passo 2 — VSR (se NON CSR)</h3>

<div class="gstep"><div class="gstep-n" style="background:var(--conc)"></div><div class="gstep-b">
  <strong>Individua le blind write</strong>
  <p>Una <b>blind write</b> è una scrittura w_i(x) dove T_i non ha mai letto x prima. Spostare una blind write non cambia i reads-from (nessuno leggeva quel valore), quindi è una mossa "gratis" per trovare equivalenza seriale.</p>
</div></div>
<div class="gstep"><div class="gstep-n" style="background:var(--conc)"></div><div class="gstep-b">
  <strong>Prova le serializzazioni</strong>
  <p>Cerca uno schedule seriale (T_a, T_b, T_c…) con gli stessi <b>reads-from</b> e le stesse <b>final write</b>. Se esiste → VSR. Reads-from: chi ha scritto x subito prima di ogni lettura. Final write: chi scrive x per ultimo.</p>
</div></div>
</div>
<div class="gbox info"><div class="gbox-label">Intuizione — perché funziona la verifica VSR?</div>
<p>Il risultato finale del DB dipende solo da due cose: <b>cosa ha letto ogni transazione</b> (reads-from) e <b>chi ha scritto l'ultimo valore</b> di ogni risorsa (final write). Tutto il resto (l'ordine interno di scritture intermedie) non conta perché nessun'altra transazione le ha lette. Quindi: se trovi uno schedule seriale con le stesse reads-from e final write → i due schedule producono esattamente gli stessi effetti sul DB → VSR.</p>
<p style="margin-top:6px">Le <b>blind write</b> w_i(x) (T_i scrive x senza averla mai letta) sono "gratuite" da spostare: poiché nessuno ha letto il valore intermedio che sovrascrivono, spostarle non cambia nessuna reads-from.</p>
</div>

<h3 class="gsub">Passo 3 — 2PL e Strict 2PL</h3>
<div class="gsteps">
<div class="gstep"><div class="gstep-n" style="background:var(--conc)"></div><div class="gstep-b">
  <strong>Costruisci la tabella lock/unlock</strong>
  <p>Regola 2PL: ogni transazione ha una <b>fase di crescita</b> (acquisisce lock) e una <b>fase di shrinking</b> (rilascia lock). Non può acquisire nuovi lock dopo aver rilasciato il primo. Cerca violazioni: T_i rilascia il lock su A e poi deve acquisire quello su B → violazione.</p>
</div></div>
<div class="gstep"><div class="gstep-n" style="background:var(--conc)"></div><div class="gstep-b">
  <strong>Strict 2PL: tutti i lock al commit</strong>
  <p>In Strict 2PL i lock vengono rilasciati <b>solo al commit/abort</b>. Questo elimina le dirty read. Se 2PL fallisce → Strict 2PL fallisce automaticamente.</p>
</div></div>
</div>
<div class="gbox info"><div class="gbox-label">Intuizione — perché il 2PL garantisce la serializzabilità?</div>
<p>La regola growing/shrinking crea un implicito <b>"punto di serializzazione"</b> per ogni transazione: il momento in cui rilascia il primo lock. Fino a quel punto T_i ha acquisito tutto quello che le serve (fase growing). Da quel momento in poi non può più cambiare idea (fase shrinking). Questo impone un ordine implicito: se T_j legge qualcosa che T_i ha scritto, T_j deve aspettare che T_i raggiunga il suo punto di serializzazione — il che crea un ordine seriale ben definito.</p>
<p style="margin-top:6px"><b>Strict 2PL</b> va oltre: tenendo tutti i lock fino al commit, nessuna altra transazione può leggere valori "parziali" di T_i prima che T_i abbia finito (no dirty read).</p>
</div>

<tr style="background:rgba(220,60,60,.07)"><td>4</td><td style="font-family:'IBM Plex Mono',monospace">w1(c)</td><td>Tenta WL(c) — dopo un release!</td><td style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:#e05555">{WL(b), WL(c)?}</td><td><span style="color:var(--d-high);font-weight:600">Shrinking</span></td><td class="no">&#10007; VIOLA</td></tr>
</tbody>
</table>
<div class="gbox warn" style="margin-top:10px"><div class="gbox-label">Perché viola 2PL?</div>
<p>T1 ha <b>rilasciato RL(a)</b> al passo 3, segnando l'inizio della fase di shrinking. Al passo 4 tenta di acquisire un nuovo lock WL(c) &#8594; <b>impossibile</b>: una volta iniziata la shrinking non si possono più acquisire lock.</p>
</div>
</div>

<h3 class="gsub">Passo 4 — TS Multi (Snapshot Isolation)</h3>
<div class="gsteps">
<div class="gstep"><div class="gstep-n" style="background:var(--conc)"></div><div class="gstep-b">
  <strong>Compila la tabella RTM/WTM</strong>
  <p>Inizia con RTM(x)=0 e WTM(x)=0 per tutte le risorse. Per ogni operazione:</p>
  <ul style="margin:6px 0 6px 18px;font-size:13px;line-height:1.9;color:var(--ink-soft)">
    <li><b style="color:var(--ink)">r_i(x)</b>: aggiorna RTM(x) = <b>i(j)</b> dove:
      <ul style="margin:2px 0 2px 16px;list-style:disc">
        <li><b>i</b> = timestamp di T_i (la transazione che sta leggendo)</li>
        <li><b>j</b> = valore <em>attuale</em> di WTM(x) <b>in questo preciso momento</b> (quale versione T_i sta leggendo dal suo snapshot)</li>
      </ul>
    </li>
    <li><b style="color:var(--ink)">w_i(x)</b>: T_i viene uccisa se ts(T_i) &lt; WTM(x) oppure ts(T_i) &lt; ts del reader in RTM(x). Se supera entrambi i controlli → WTM(x) = i.</li>
  </ul>
</div></div>
</div>
<div class="gbox warn" style="border-color:var(--conc)"><div class="gbox-label" style="background:var(--conc)">Dubbio frequente — perché r1(x) → RTM(x) = 1(0) e non 1(2)?</div>
<p>Il numero <b>j</b> nella notazione <b>i(j)</b> è il <b>valore di WTM(x) al momento in cui T_i legge</b> — non il timestamp di un'altra transazione!</p>
<p style="margin-top:8px">Esempio: se al passo 1 dello schedule WTM(x) è ancora 0 (nessuno ha ancora scritto x), allora r1(x) produce RTM(x) = <b>1(0)</b>: significa "T1 ha letto la versione 0 di x (quella iniziale)".</p>
<p style="margin-top:8px">Diventerebbe <b>1(2)</b> solo se T2 avesse già scritto x <em>prima</em> di r1(x), cioè se WTM(x) fosse già 2 quando T1 legge. In quel caso T1 leggerebbe la versione scritta da T2, e RTM(x) = 1(2) direbbe "T1 ha letto la versione scritta da T2".</p>
</div>
<div class="gbox warn"><div class="gbox-label">Regola pratica per TS Multi</div>
<p><b>w_i(x) viene uccisa se:</b> i &lt; ultimo WTM(x) (qualcuno ha scritto x dopo di te) oppure i &lt; RTM(x) (qualcuno ha letto x con timestamp più recente del tuo).</p>
</div>

<div class="gbox danger"><div class="gbox-label">TS Mono vs TS Multi — la differenza chiave</div>
<table class="gtbl" style="font-size:12.5px">

<p style="margin-top:8px"><b>In pratica:</b> TS Multi non killa mai sulle letture — la transazione legge semplicemente la versione giusta dal suo "snapshot". TS Mono invece killa se qualcuno ha già scritto una versione più recente.</p>

`<h3 class="gsub">Cos'è il deadlock distribuito</h3>
<p style="font-size:14px;color:var(--ink-soft);margin-bottom:14px">In un sistema distribuito, il DB è su più nodi. Le transazioni su nodi diversi possono aspettarsi a vicenda formando un ciclo (deadlock) che nessun singolo nodo riesce a vedere per intero. L'algoritmo di Obermarck rileva questi cicli passando messaggi tra i nodi.</p>

<h3 class="gsub">Il wait-for graph distribuito</h3>
<p style="font-size:13.5px;color:var(--ink-soft);margin-bottom:12px">Ogni nodo mantiene il proprio grafo di attesa locale. Gli archi <b>E_X → t_i</b> significano "T_i aspetta una transazione esterna dal nodo X". Gli archi <b>t_j → E_X</b> significano "una transazione esterna al nodo X aspetta T_j".</p>

<div class="gbox info"><div class="gbox-label">Formato dei messaggi</div>
<p>Un messaggio ha la forma <b>E_X → T_i → … → T_j → E_Y</b> e viene inviato al nodo Y.<br>
Significa: "esiste un cammino di attesa che entra al nodo corrente da X, passa per T_i…T_j, ed esce verso Y".<br>
La <b>convenzione</b> (i &lt; j oppure i &gt; j) dice <em>quali</em> cammini trasmettere tra quelli trovati.</p>
</div>

<h3 class="gsub">Algoritmo passo-passo</h3>
<div class="gsteps">
<div class="gstep"><div class="gstep-n" style="background:var(--trig)"></div><div class="gstep-b">
  <strong>Ogni nodo cerca cammini E_X → … → E_Y nel proprio grafo locale</strong>
  <p>Un cammino che inizia con un arco entrante da fuori (E_X→) e finisce con uno uscente verso fuori (→E_Y) può essere trasmesso al nodo Y. Il nodo che segue è sempre determinato dall'<b>ultimo E_Y nel cammino</b>: se il cammino termina con →E_B, il messaggio va a B, e sarà B il prossimo ad agire.</p>
</div></div>
<div class="gstep"><div class="gstep-n" style="background:var(--trig)"></div><div class="gstep-b">
  <strong>Applica la convenzione di trasmissione</strong>
  <p><b>Convenzione i &lt; j:</b> trasmetti il cammino E_X → T_i → … → T_j → E_Y solo se i &lt; j.<br>
  <b>Convenzione i &gt; j:</b> trasmetti solo se i &gt; j.<br>
  L'esame specifica sempre quale usare. Convenzioni diverse cambiano il numero di iterazioni, ma entrambe rilevano il deadlock.</p>
</div></div>
<div class="gstep"><div class="gstep-n" style="background:var(--trig)"></div><div class="gstep-b">
  <strong>Ogni nodo riceve, integra e propaga nuovamente</strong>
  <p>Aggiungi il cammino ricevuto al grafo locale. Cerca nuovi cammini da trasmettere (combinando il cammino ricevuto con quelli già presenti localmente). Il <b>deadlock è rilevato</b> quando appare un cammino E_X → … → E_X con lo stesso nodo X a entrambi gli estremi.</p>
</div></div>
</div>

<div class="gbox warn"><div class="gbox-label">Dubbio frequente — "At node A" ma nel diagramma vedo T8 che sta in D</div>
<p>Nelle soluzioni dei TDE, <b>"At node A"</b> significa che <b>A è il nodo che INVIA</b> il messaggio.<br>
Il diagramma mostrato subito dopo è lo stato aggiornato del <b>nodo DESTINATARIO</b> (es. D), <em>non di A</em>.<br>
Quindi se il testo dice "At A: messaggio … inviato a D" e vedi T8 nel diagramma — T8 appartiene a D (lo aveva già nel suo WFG originale), non ad A. Stai guardando il grafo di D aggiornato dopo aver ricevuto il messaggio da A.</p>
</div>

<div class="gbox warn"><div class="gbox-label">Dubbio frequente — come mai il WFG di un nodo contiene transazioni di altri nodi?</div>
<p>Quando un nodo <b>riceve un messaggio</b>, aggiunge l'intero cammino al suo grafo locale.<br>
Esempio: A riceve <code>E_A → T2 → T5 → E_A</code> da B. Ora il WFG di A contiene T2 e T5, anche se queste transazioni sono fisicamente su altri nodi.<br>
Questo è voluto: Obermarck accumula <b>conoscenza distribuita</b> tramite i messaggi. Un nodo non vede solo le proprie transazioni, ma anche quelle arrivate via messaggi, per poter rilevare cicli globali.</p>
</div>

<h3 class="gsub">Cos'è lo skyline</h3>
<p style="font-size:14px;color:var(--ink-soft);margin-bottom:12px">Lo skyline è l'insieme degli elementi <b>potenzialmente ottimali</b>: un elemento è nello skyline se nessun altro lo domina su tutti gli attributi contemporaneamente. Utile quando non conosci la funzione di scoring esatta ma vuoi eliminare le opzioni chiaramente peggiori.</p>

<h3 class="gsub">Dominanza</h3>
<p style="font-size:13.5px;color:var(--ink-soft);margin-bottom:10px"><b>a domina b</b> (scritto a ≺ b) se a è ≥ b su tutti gli attributi e > su almeno uno. Agli esami Poli: valori più alti = migliori (salvo indicazione contraria).</p>

<h3 class="gsub">Algoritmo SFS (Sorted Filter Skyline)</h3>
<div class="gsteps">
<div class="gstep"><div class="gstep-n" style="background:var(--rank)"></div><div class="gstep-b">
  <strong>Ordina il dataset con una funzione monotona</strong>
  <p>La funzione deve garantire che se P domina Q, allora P venga prima di Q nell'ordinamento. Hai due opzioni equivalenti:</p>
  <table class="gtbl" style="margin-top:8px">
  <tr><th>Approccio</th><th>Come si fa</th><th>Quando è comodo</th></tr>
  <tr><td><b>Somma</b></td><td>Calcola a₁+a₂+…+aₙ per ogni elemento, ordina per somma</td><td>Con 3+ attributi — dai un solo numero a ogni elemento</td></tr>
  <tr><td><b>Lessicografico</b></td><td>Ordina per il primo attributo, usa il secondo come tiebreak, poi il terzo, ecc.</td><td>Con 2 attributi — immediato a mente</td></tr>
  </table>
  <p style="margin-top:8px;font-size:12.5px;color:var(--ink-soft)">Entrambi sono validi perché entrambi sono funzioni monotone. Se gli attributi sono "higher is better" ordini in modo decrescente; se "lower is better" in modo crescente. Se sono misti, prima inverti quelli "higher is better" (es. max−valore) così diventano tutti della stessa direzione.</p>
</div></div>
<div class="gstep"><div class="gstep-n" style="background:var(--rank)"></div><div class="gstep-b">
  <strong>Il primo elemento entra sempre nello skyline</strong>
  <p>Per costruzione dell'ordinamento, il primo elemento non può essere dominato da nessuno che viene dopo.</p>
</div></div>
<div class="gstep"><div class="gstep-n" style="background:var(--rank)"></div><div class="gstep-b">
  <strong>Per ogni elemento successivo: controlla la dominanza rispetto a tutti i già-skyline</strong>
  <p>Se anche <b>uno solo</b> dei già-skyline lo domina su <b>tutti</b> gli attributi → fuori. Altrimenti → entra nello skyline. Con N attributi controlli semplicemente tutte le N dimensioni.</p>
</div></div>
</div>

<h3 class="gsub">k-Skyband</h3>
<p style="font-size:13.5px;color:var(--ink-soft)">Il <b>k-skyband</b> include tutti gli elementi dominati da meno di k elementi. Lo skyline normale è il 1-skyband. Per calcolare il 2-skyband: conta quanti skyline-elements dominano ogni non-skyline; se meno di 2 → entra nel 2-skyband.</p>

<div class="gbox danger"><div class="gbox-label">Skyline, L1 e convex hull — chi può essere top-1?</div>
<table class="gtbl" style="font-size:12.5px">
<tr><th>Famiglia di funzioni</th><th>Chi può essere top-1?</th></tr>
<tr><td><b>Qualsiasi funzione monotona</b></td><td><b>Tutti</b> gli elementi dello skyline</td></tr>
<tr><td><b>L1</b> = tutte le funzioni lineari w1·x + w2·y (w1, w2 ≥ 0)</td><td>Solo quelli sul <b>convex hull</b> (guscio convesso) dello skyline</td></tr>
<tr><td><b>F ⊂ L1</b> = sottoinsiemi con vincoli (es. w1 &gt; w2)</td><td>Sottoinsieme ancora più ristretto del convex hull</td></tr>
</table>
<p style="margin-top:10px"><b>Perché il convex hull?</b> Una funzione lineare f = w1·x + w2·y definisce una "direzione" nello spazio. Il top-1 è il punto più estremo in quella direzione — e i punti estremi di un insieme sono esattamente quelli sul convex hull. I punti "dentro" il convex hull non saranno mai i più estremi per nessuna direzione.</p>
</div>

<div class="gbox ex"><div class="gbox-label">Esempio — TDE Gennaio 2025 (hotel)</div>
<p style="font-size:12.5px;color:var(--ink-soft);margin-bottom:8px">Skyline = {a, h, b, e, i}. Lower is better (distanze). f(x,y) = w1·ts + w2·ch.</p>
<ul style="font-size:12.5px;color:var(--ink-soft)">
<li><b>L1 (tutti i pesi ≥ 0):</b> top-1 possibili = {<b>a, e, i</b>} (convex hull). h e b sono skyline ma "dentro" il guscio → nessuna retta li rende top-1.</li>
<li><b>F con w1 &gt; w2:</b> i non può battere e. Perché? Score(i) &lt; Score(e) richiede w1·0.80+w2·0.10 &lt; w1·0.60+w2·0.20 → w1·0.20 &lt; w2·0.10 → w1 &lt; 0.5·w2 → <b>w1 &lt; w2</b>. Ma F richiede w1 &gt; w2! Quindi i è escluso → top-1 possibili = {<b>a, e</b>}.</li>
</ul>

`<h3 class="gsub">Cos'è FA (Fagin's Algorithm)</h3>
<p style="font-size:14px;color:var(--ink-soft);margin-bottom:12px">I dati sono distribuiti su m server, ognuno ordinato per un attributo. FA trova i top-k in due fasi: prima legge in ordine finché k elementi sono comuni a tutte le liste, poi fa accessi casuali per completare i punteggi.</p>

<div class="gsteps">

  <strong>Fase 1 — Accessi ordinati (s.a.): leggi da tutte le liste in parallelo</strong>
  <p>Ad ogni round leggi un elemento da ogni lista. Tieni traccia di tutti gli elementi visti finora. Fermati quando hai trovato <b>k elementi presenti in tutte le m liste</b>.</p>

<div class="gstep"><div class="gstep-n" style="background:var(--rank)"></div><div class="gstep-b">

  <p>Per ogni elemento comune, se manca il valore su qualche lista → accesso casuale. Ora conosci il punteggio completo di tutti gli elementi comuni.</p>
</div></div>
<div class="gstep"><div class="gstep-n" style="background:var(--rank)"></div><div class="gstep-b">
