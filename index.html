  <div style="background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-family:'IBM Plex Mono',monospace;font-size:12px">obj <b>1</b> → score <b style="color:var(--rank)">5.45</b></div>
  <div style="background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-family:'IBM Plex Mono',monospace;font-size:12px">obj <b>2</b> → score <b style="color:var(--rank)">5.00</b></div>
  <div style="background:rgba(255,122,61,.12);border:1px solid var(--rank);border-radius:8px;padding:8px 12px;font-weight:700;font-size:12px">Top-2 = { 1, 2 } &nbsp;✓</div>
</div>
<div style="margin-top:8px;font-size:11.5px;color:var(--ink-soft)">s.a. totali = 12 (4 round × 3 liste) · r.a. aggiuntivi per score incompleti</div>
</div>`,

`<h3 class="gsub">Cos'è TA (Threshold Algorithm)</h3>
<p style="font-size:14px;color:var(--ink-soft);margin-bottom:12px">TA usa una <b>soglia (threshold T)</b>: il punteggio massimo teorico di qualsiasi elemento non ancora completamente visto. Si ferma prima di FA perché non aspetta k elementi comuni.</p>

<div class="gsteps">
<div class="gstep"><div class="gstep-n" style="background:var(--rank)"></div><div class="gstep-b">
  <strong>Ad ogni round: leggi un elemento da ogni lista (accesso ordinato)</strong>
  <p>Per ogni nuovo elemento, fai subito <b>accessi casuali</b> sulle altre liste per calcolarne lo score completo.</p>
</div></div>
<div class="gstep"><div class="gstep-n" style="background:var(--rank)"></div><div class="gstep-b">
  <strong>Calcola la soglia T = f(ultimo_L1, ultimo_L2, …, ultimo_Lm)</strong>
  <p>T è il punteggio massimo possibile per qualsiasi elemento non ancora completamente visto (con funzione monotona).</p>
</div></div>
<div class="gstep"><div class="gstep-n" style="background:var(--rank)"></div><div class="gstep-b">
  <strong>Fermati quando il k-esimo score nel buffer ≥ T</strong>
  <p>Nessun elemento non visto può superare il k-esimo: output i k migliori nel buffer.</p>
</div></div>
</div>
<div style="background:var(--paper2);border:1px solid var(--line);border-radius:12px;padding:14px;margin:12px 0">
<div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--rank);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px">TA — TDE Gennaio 2024 · top-2 · f = MAX(Landscape, Cultural, Activities)</div>
<div style="overflow-x:auto">
<table class="gtbl" style="white-space:nowrap">
<tr><th>Round</th><th>Lista Landscape (s.a.)</th><th>Lista Cultural (s.a.)</th><th>Lista Activities (s.a.)</th><th>Nuovi score (r.a.)</th><th>Buffer top-2</th><th>Soglia T</th><th>Stop?</th></tr>
<tr>
  <td><b>1</b></td>
  <td>A : 0.9</td><td>B : 0.9</td><td>F : 1.0</td>
  <td>A→MAX(0.9,0.6,0.8)=<b>0.9</b><br>B→MAX(0.8,0.9,0.7)=<b>0.9</b><br>F→MAX(0.6,0.8,1.0)=<b>1.0</b></td>
  <td><span style="color:var(--d-low)">F:1.0</span>, A:0.9</td>
  <td>MAX(0.9,0.9,1.0)=<b>1.0</b></td>
  <td>0.9 &lt; 1.0 ✗</td>
</tr>
<tr style="background:rgba(54,210,122,.07)">
  <td><b>2</b></td>
  <td>B : 0.8</td><td>D : 0.8</td><td>D : 0.9</td>
  <td>D→MAX(0.7,0.8,0.9)=<b>0.9</b></td>
  <td><span style="color:var(--d-low)">F:1.0</span>, <b style="color:var(--rank)">A:0.9</b></td>
  <td>MAX(0.8,0.8,0.9)=<b>0.9</b></td>
  <td style="color:var(--d-low);font-weight:700">0.9 ≥ 0.9 ✓ STOP</td>
</tr>
</table>
</div>
<div style="margin-top:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
  <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-soft)">Top-2 =</span>
  <span style="background:var(--rank);color:#fff;border-radius:5px;padding:3px 10px;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700">F (1.0)</span>
  <span style="background:var(--rank);color:#fff;border-radius:5px;padding:3px 10px;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700">A (0.9)</span>
  <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-soft)">· s.a. = 6 · r.a. = 6</span>
</div>
<p style="font-size:12px;color:var(--ink-soft);margin-top:6px">La soglia T scende da 1.0 a 0.9. Al round 2, il 2° nel buffer (A con 0.9) ≥ T=0.9 → nessun elemento non ancora visto può superare il 2° → STOP.</p>
</div>
<div class="gbox info"><div class="gbox-label">TA è instance-optimal</div>
<p>Tra tutti gli algoritmi che usano sia s.a. che r.a., TA non fa mai più accessi del necessario (per istanza). In generale TA fa meno accessi di FA, ma non sempre.</p>
</div>`,

`<h3 class="gsub">Cos'è NRA (No Random Access)</h3>
<p style="font-size:14px;color:var(--ink-soft);margin-bottom:12px">NRA si usa quando gli accessi casuali non sono disponibili. Usa solo accessi ordinati, ma stima i punteggi con un intervallo [lb, ub] che si restringe man mano che si vedono più dati.</p>

<div class="gsteps">
<div class="gstep"><div class="gstep-n" style="background:var(--rank)"></div><div class="gstep-b">
  <strong>Ad ogni round leggi un elemento da ogni lista (solo s.a.)</strong>
  <p>Per ogni elemento nel buffer, conosci solo i valori sulle liste in cui lo hai già visto.</p>
</div></div>
<div class="gstep"><div class="gstep-n" style="background:var(--rank)"></div><div class="gstep-b">
  <strong>Calcola lb e ub per ogni elemento nel buffer</strong>
  <p><b>lb</b> = score usando valori noti e <b>0</b> per gli ignoti.<br>
  <b>ub</b> = score usando valori noti e l'<b>ultimo valore visto</b> su quella lista per gli ignoti (il massimo ancora possibile).</p>
</div></div>
<div class="gstep"><div class="gstep-n" style="background:var(--rank)"></div><div class="gstep-b">
  <strong>Fermati quando i top-k sono certi: lb del k-esimo ≥ ub di tutti gli altri</strong>
  <p>Quando nessun elemento fuori dal top-k potrà mai superare il k-esimo, si ferma.</p>
</div></div>
</div>
<div class="gbox danger"><div class="gbox-label">Il threshold τ in NRA — uguale a TA!</div>
<p>Il threshold si calcola <b>esattamente come in TA</b>: ad ogni round prendi l'ultimo valore letto da ciascuna lista e calcoli f con quelli.</p>
<p>Esempio con f = 4A + 2B + C:<br>
Round 1: last A=1.00, last B=0.80, last C=0.60 → τ = 4(1.00)+2(0.80)+0.60 = <b>6.20</b><br>
Round 2: last A=0.80, last B=0.65, last C=0.60 → τ = 4(0.80)+2(0.65)+0.60 = <b>5.10</b><br>
Round 3: last A=0.70, last B=0.55, last C=0.50 → τ = 4(0.70)+2(0.55)+0.50 = <b>4.40</b></p>
</div>

<div class="gbox warn"><div class="gbox-label">Come calcolare lb e ub</div>
<p><b>lb (lower bound)</b>: usa i valori noti + <b>0</b> per quelli mancanti (pessimistico).<br>
<b>ub (upper bound)</b>: usa i valori noti + <b>l'ultimo valore visto in quella lista</b> per quelli mancanti (ottimistico — non possono essere più alti di così).</p>
<p>Esempio: item 1 visto solo nella lista A con A=1.00, al round 1 (last B=0.80, last C=0.60):<br>
lb = 4(1.00) + 2(<b>0</b>) + <b>0</b> = 4.00<br>
ub = 4(1.00) + 2(<b>0.80</b>) + <b>0.60</b> = 6.20</p>
</div>

<div class="gbox info"><div class="gbox-label">Stopping condition NRA vs TA</div>
<p><b>TA</b>: k-esimo score ≥ τ (confronto con la soglia).<br>
<b>NRA</b>: il k-esimo <b>lb</b> nel buffer ≥ il massimo <b>ub</b> di tutti gli item fuori dal top-k, <b>e</b> ≥ τ.<br>
In pratica: quando sei sicuro che nessun item fuori dal top-k potrà mai superare quelli dentro.</p>
</div>

<div class="gbox ex"><div class="gbox-label">Confronto FA / TA / NRA</div>
<table class="gtbl">
<tr><th>Algoritmo</th><th>Accessi casuali</th><th>Stopping criterion</th></tr>
<tr><td>FA</td><td>Sì (fase 2)</td><td>k elementi comuni in tutte le liste</td></tr>
<tr><td>TA</td><td>Sì (ogni round)</td><td>k-esimo score ≥ soglia τ</td></tr>
<tr><td>NRA</td><td>No</td><td>lb k-esimo ≥ ub tutti gli altri e ≥ τ</td></tr>
</table>
</div>`]
},

"Physical DB": {
  tabs: ["B+ tree","Hash index","Query plan & costi","Esempi TDE"],
  sections: [`
<h3 class="gsub">Cos'è un B+ tree</h3>
<p style="font-size:14px;color:var(--ink-soft);margin-bottom:12px">Un B+ tree è un indice strutturato su più livelli. I nodi interni guidano la ricerca, le foglie contengono le chiavi con puntatori ai dati (indice secondario) o i dati stessi (indice primario/clustered). Tutte le foglie sono collegate in lista.</p>

<h3 class="gsub">Costi di accesso con B+ tree</h3>
<div class="gsteps">
<div class="gstep"><div class="gstep-n" style="background:var(--phys)"></div><div class="gstep-b">
  <strong>Ricerca per chiave primaria (1 tupla)</strong>
  <p>Costo = numero di livelli del B+. Es: B+ con 3 livelli → <b>3 I/O</b> (2 nodi interni + 1 foglia).</p>
</div></div>
<div class="gstep"><div class="gstep-n" style="background:var(--phys)"></div><div class="gstep-b">
  <strong>Range query su indice primario (dati ordinati fisicamente)</strong>
  <p>Costo = (livelli − 1 nodi interni) + <b>foglie con i dati da leggere</b>. Le foglie sono contigue → efficiente.</p>
</div></div>
<div class="gstep"><div class="gstep-n" style="background:var(--phys)"></div><div class="gstep-b">
  <strong>Stima delle foglie da leggere</strong>
  <p>foglie = leaf_nodes_totali × (tuple_sel / tuple_totali)<br>
  Es: 1300 foglie, val(Country)=100 → 1300/100 = 13 foglie per un paese.</p>
</div></div>
<div class="gstep"><div class="gstep-n" style="background:var(--phys)"></div><div class="gstep-b">
  <strong>Indice secondario: aggiunge un accesso per ogni puntatore</strong>
  <p>Foglie → puntatori → accesso al dato. Con tuple sparse: ogni puntatore = 1 I/O aggiuntivo. Con tuple clusterizzate: risparmio.</p>
</div></div>
</div>

<h3 class="gsub">B+ tree con chiave composita</h3>
<p style="font-size:14px;color:var(--ink-soft);margin-bottom:12px">Un B+ su <b>(A, B)</b> ordina prima per A, poi per B dentro ogni gruppo di A uguale. Questo permette lookup efficienti quando conosci <b>entrambi</b> i valori, o quando filtri su A e poi cerchi un B specifico.</p>

<div class="gbox danger"><div class="gbox-label">Vantaggio chiave: lookup su entrambe le condizioni in un solo percorso</div>
<p>Con B+ su (RouteTo, PassengerId), cercare RouteTo="New York" AND PassengerId=42 costa solo <b>i livelli del B+</b> (es. 3 I/O). Senza chiave composita dovresti: trovare tutti i ticket di New York (1200), poi filtrare per PassengerId.</p>
</div>

<div class="gbox ex"><div class="gbox-label">Esempio — TDE Gen 2025 scenario 3: hash su City + B+ composito su (RouteTo, PassengerId)</div>
<p style="font-size:12.5px;color:var(--ink-soft);margin-bottom:8px">Passenger: 40K tuple, val(City)=500, hash su City (600 blocchi). Ticket: 300K tuple, B+ composito su (RouteTo, PassengerId): 3 livelli, 6K foglie.</p>
<ol style="font-size:12.5px;color:var(--ink-soft);line-height:2">
<li><b>Hash su City="Los Angeles"</b>: 1 I/O (lookup diretto nel bucket)</li>
<li><b>Segui 80 puntatori</b> ai passenger di LA (40K/500 = 80): 80 I/O</li>
<li><b>Per ognuno dei 80 passenger</b>, cerca nel B+ composito (RouteTo="New York", PassengerId=X): il B+ è ordinato per RouteTo poi PassengerId → lookup diretto in <b>3 I/O</b> (2 intermedi + 1 foglia)</li>
</ol>
<div style="font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--ink);background:var(--bg);border-radius:7px;padding:8px 12px;margin-top:8px">
Costo = 1 + 80 + 80 × 3 = <b style="color:var(--d-low)">321 I/O</b>
</div>
<p style="font-size:12px;color:var(--ink-soft);margin-top:8px"><b>Confronto:</b> senza B+ composito (scenario 2, hash su PassengerId): 1 + 80 + 80 × (1 + 7.5) = 761 I/O. Il B+ composito risparmia perché non devi leggere tutti i ticket del passeggero e poi filtrare — vai diretto ai ticket "New York" di quel passeggero.</p>
</div>`,

`<h3 class="gsub">Cos'è un Hash index</h3>
<p style="font-size:14px;color:var(--ink-soft);margin-bottom:12px">Applica una funzione hash all'attributo per trovare direttamente il blocco. Velocissimo per uguaglianza, inutile per range query.</p>

<div class="gsteps">
<div class="gstep"><div class="gstep-n" style="background:var(--phys)"></div><div class="gstep-b">
  <strong>Costo ricerca esatta: 1 I/O (+ catena di overflow)</strong>
  <p>Se l'esame dice "no overflow" → 1 I/O. Se dice "costo di overflow 1.3" → 1.3 I/O in media.</p>
</div></div>
<div class="gstep"><div class="gstep-n" style="background:var(--phys)"></div><div class="gstep-b">
  <strong>Non supporta range query</strong>
  <p>Per WHERE A &gt; 10 o BETWEEN → devi usare B+ o scansione sequenziale.</p>
</div></div>
</div>
<div class="gbox info"><div class="gbox-label">Notazione</div>
<p><b>t(R)</b> = tuple di R · <b>b(R)</b> = blocchi di R · <b>val(A)</b> = valori distinti di A<br>
Selettività di "A = valore": t(R) / val(A) tuple selezionate.</p>
</div>`,

`<h3 class="gsub">Nested Loop Join (NLJ)</h3>
<div class="gformula">Costo NLJ = b(R) + t(R) × b(S)
(R = tabella esterna, S = tabella interna)</div>
<p style="font-size:13.5px;color:var(--ink-soft);margin-bottom:14px">È quasi sempre il piano peggiore. Usalo come baseline. Metti come esterna la tabella più piccola (o quella con cui filtri di più).</p>

<h3 class="gsub">Come scegliere il piano ottimale</h3>
<div class="gsteps">
<div class="gstep"><div class="gstep-n" style="background:var(--phys)"></div><div class="gstep-b">
  <strong>Calcola quante tuple sopravvivono a ogni filtro WHERE</strong>
  <p>Usa t(R)/val(A) per uguaglianza. Moltiplica per percentuali se indicato.</p>
</div></div>
<div class="gstep"><div class="gstep-n" style="background:var(--phys)"></div><div class="gstep-b">
  <strong>Parti dalla tabella con il filtro più selettivo</strong>
  <p>Se c'è un indice su quella condizione → usalo. Ottieni poche tuple → poi fai lookup sull'altra tabella.</p>
</div></div>
<div class="gstep"><div class="gstep-n" style="background:var(--phys)"></div><div class="gstep-b">
  <strong>Per il join: usa l'indice sulla tabella interna</strong>
  <p>Costo = n_tuple_filtrate × costo_lookup_indice(tabella_interna)</p>
</div></div>
<div class="gstep"><div class="gstep-n" style="background:var(--phys)"></div><div class="gstep-b">
  <strong>Scrivi la formula completa e confronta i piani</strong>
</div></div>
</div>`,

`<div style="background:var(--paper2);border:1px solid var(--line);border-radius:12px;padding:14px;margin:12px 0">
<div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--phys);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px">TDE Gennaio 2025 — Ticket JOIN Passenger</div>
<div style="font-size:12.5px;color:var(--ink-soft);margin-bottom:10px">Ticket: 300K tuple · 45K blocchi · val(RouteTo)=250 &nbsp;|&nbsp; Passenger: B+ 3 livelli, 2500 foglie</div>
<div style="display:flex;flex-direction:column;gap:10px">
  <div style="background:var(--bg);border:1.5px solid var(--d-low);border-radius:9px;padding:11px 14px">
    <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;color:var(--d-low);margin-bottom:6px">Piano 1 — scan Ticket → lookup Passenger (B+)</div>
    <div style="font-size:13px;font-family:'IBM Plex Mono',monospace;color:var(--ink)">
      b(Ticket) + (t(Ticket)/val(RouteTo)) × livelli B+<br>
      = 45K + (300K/250) × 3<br>
      = 45K + 1.200 × 3 = <b style="color:var(--d-low)">48.600 I/O</b>
    </div>
  </div>
  <div style="background:var(--bg);border:1.5px solid var(--d-high);border-radius:9px;padding:11px 14px">
    <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;color:var(--d-high);margin-bottom:6px">Piano 2 — scan Passenger → scan Ticket per ognuno</div>
    <div style="font-size:13px;font-family:'IBM Plex Mono',monospace;color:var(--ink)">
      2500 + (40K/500) × 45K<br>
      = 2.500 + 80 × 45K = <b style="color:var(--d-high)">~3.6M I/O ✗</b>
    </div>
  </div>
</div>
</div>

<div style="background:var(--paper2);border:1px solid var(--line);border-radius:12px;padding:14px;margin:12px 0">
<div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--phys);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px">TDE Settembre 2025 — City JOIN Event con B+ su Date</div>
<div style="font-size:12.5px;color:var(--ink-soft);margin-bottom:10px">Event: 1M tuple · 5K blocchi · B+ su Date: 3 livelli, 1200 foglie · 1% nel range = 10K tuple</div>
<div style="display:flex;flex-direction:column;gap:10px">
  <div style="background:var(--bg);border:1.5px solid var(--d-mid);border-radius:9px;padding:11px 14px">
    <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;color:var(--d-mid);margin-bottom:6px">Piano A — usa B+ su Date</div>
    <div style="font-size:13px;font-family:'IBM Plex Mono',monospace;color:var(--ink)">
      2 nodi interni + 12 foglie B+<br>
      + 10K lookup dati + 4×4 lookup City<br>
      = <b>~10.030 I/O</b>
    </div>
  </div>
  <div style="background:var(--bg);border:1.5px solid var(--d-low);border-radius:9px;padding:11px 14px">
    <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;color:var(--d-low);margin-bottom:6px">Piano B — full scan Event (no indice su Date)</div>
    <div style="font-size:13px;font-family:'IBM Plex Mono',monospace;color:var(--ink)">
      5K (scan Event) + 4×4 (lookup City)<br>
      = <b style="color:var(--d-low)">5.016 I/O ← più efficiente!</b>
    </div>
  </div>
</div>
<div style="margin-top:10px;background:rgba(255,90,90,.10);border:1px solid rgba(255,90,90,.3);border-radius:8px;padding:9px 13px;font-size:12.5px;color:var(--d-high);font-weight:600">
  ⚠ L'indice non aiuta sempre: quando la selettività è bassa (1%), i 10K lookup ai dati costano più della scansione completa da 5K blocchi. Confronta sempre i piani con i numeri.
</div>
</div>`]
},

"Triggers": {
  tabs: ["Sintassi & concetti","Come progettare","Terminazione","Esempi completi"],
  sections: [`
<h3 class="gsub">Struttura di un trigger</h3>
<div class="gcode"><span class="kw">CREATE TRIGGER</span> nome
<span class="ghl">AFTER</span> | BEFORE
<span class="kw">INSERT</span> | <span class="kw">UPDATE</span> [<span class="kw">OF</span> colonna] | <span class="kw">DELETE</span>
<span class="kw">ON</span> tabella
[<span class="kw">FOR EACH ROW</span> | <span class="kw">FOR EACH STATEMENT</span>]
[<span class="kw">WHEN</span> (condizione)]
<span class="kw">BEGIN</span>
  <span class="gcm">-- corpo</span>
<span class="kw">END</span>;</div>

<h3 class="gsub">BEFORE vs AFTER</h3>
<table class="gtbl">
<tr><th>Timing</th><th>Quando si attiva</th><th>Uso tipico</th></tr>
<tr><td>BEFORE</td><td>Prima della modifica al DB</td><td>Validazione, blocco operazione (RAISE EXCEPTION), correzione valori</td></tr>
<tr><td>AFTER</td><td>Dopo la modifica al DB</td><td>Propagazione effetti su altre tabelle (quasi sempre agli esami)</td></tr>
</table>

<h3 class="gsub">FOR EACH ROW vs FOR EACH STATEMENT</h3>
<table class="gtbl">
<tr><th>Granularità</th><th>Si esegue</th><th>OLD/NEW disponibili</th></tr>
<tr><td>FOR EACH ROW</td><td>Una volta per ogni tupla modificata</td><td class="ok">Sì (quasi sempre usato)</td></tr>
<tr><td>FOR EACH STATEMENT</td><td>Una volta per tutta l'istruzione</td><td class="no">No</td></tr>
</table>

<h3 class="gsub">OLD e NEW</h3>
<table class="gtbl">
<tr><th>Variabile</th><th>INSERT</th><th>UPDATE</th><th>DELETE</th></tr>
<tr><td>NEW.col</td><td class="ok">Nuova riga</td><td class="ok">Valori nuovi</td><td class="no">Non disponibile</td></tr>
<tr><td>OLD.col</td><td class="no">Non disponibile</td><td class="ok">Valori vecchi</td><td class="ok">Riga eliminata</td></tr>
</table>

<h3 class="gsub">Bloccare un'operazione — SIGNAL vs RAISE EXCEPTION</h3>
<p style="font-size:13px;color:var(--ink-soft);margin-bottom:8px">Nei trigger BEFORE puoi bloccare l'operazione segnalando un errore. I due esami usano sintassi diverse a seconda del DBMS:</p>
<table class="gtbl">
<tr><th>Sintassi</th><th>DBMS</th><th>Quando la trovi</th></tr>
<tr><td><div class="gcode" style="margin:0;padding:4px 8px;font-size:12px"><span class="kw">SIGNAL SQLSTATE</span> <span class="gstr">'45000'</span><br><span class="kw">SET MESSAGE_TEXT</span> = <span class="gstr">'Errore!'</span>;</div></td><td>DB2 / MySQL</td><td>TDE sett 2023, lug 2025, giu 2025</td></tr>
<tr><td><div class="gcode" style="margin:0;padding:4px 8px;font-size:12px"><span class="kw">RAISE EXCEPTION</span> <span class="gstr">'Errore!'</span>;</div></td><td>PostgreSQL</td><td>TDE 2022, 2023, 2024</td></tr>
</table>
<div class="gbox info"><div class="gbox-label">Codice SQLSTATE</div>
<p>Il codice nella stringa (es. <b>'45000'</b>, <b>'70001'</b>) è arbitrario — serve solo a identificare il tipo di errore. Il valore esatto non conta per l'esame; l'importante è usare la sintassi corretta. Tipicamente si usano codici che iniziano con '45' o '70' per errori user-defined.</p>
</div>

<h3 class="gsub">DECLARE e SELECT INTO</h3>
<p style="font-size:13px;color:var(--ink-soft);margin-bottom:8px">Dentro il corpo di un trigger puoi dichiarare variabili locali e popolarle con una query:</p>
<div class="gcode"><span class="kw">BEGIN</span>
  <span class="kw">DECLARE</span> emp_count <span class="kw">INT</span>;          <span class="gcm">-- dichiara variabile</span>
  <span class="kw">SELECT</span> <span class="kw">COUNT</span>(*) <span class="kw">INTO</span> emp_count  <span class="gcm">-- popola da query</span>
  <span class="kw">FROM</span> EMP <span class="kw">WHERE</span> deptID = OLD.deptID;

  <span class="kw">IF</span> emp_count = 0 <span class="kw">THEN</span>
    <span class="kw">SIGNAL SQLSTATE</span> <span class="gstr">'45000'</span>
    <span class="kw">SET MESSAGE_TEXT</span> = <span class="gstr">'Ultimo dipendente: impossibile eliminare'</span>;
  <span class="kw">END IF</span>;

  <span class="kw">UPDATE</span> ... <span class="kw">SET</span> ratio = totAmt / emp_count ...;
<span class="kw">END</span>;</div>
<div class="gbox warn"><div class="gbox-label">SELECT INTO vs SELECT normale</div>
<p><b>SELECT INTO var</b> assegna il risultato a una variabile locale — funziona solo se la query ritorna esattamente una riga. Se ritorna zero righe la variabile rimane NULL; se ritorna più righe va in errore. Usa sempre una query con WHERE sulla PK o con COUNT()/SUM() per essere sicuro.</p>
</div>

<h3 class="gsub">COALESCE — il primo valore non NULL</h3>
<p style="font-size:13px;color:var(--ink-soft);margin-bottom:8px"><b>COALESCE(v1, v2, v3, ...)</b> ritorna il primo argomento che non è NULL. Se tutti sono NULL ritorna NULL.</p>
<div class="gcode"><span class="gcm">-- se salary è NULL usa 0 come fallback</span>
<span class="kw">COALESCE</span>(NEW.salary, 0)

<span class="gcm">-- utile negli UPDATE quando la variabile può essere NULL</span>
<span class="kw">UPDATE</span> PROJECTS_INCOME
<span class="kw">SET</span> perCapitaAmt = totAmt / <span class="kw">COALESCE</span>(emp_count, 1)
<span class="kw">WHERE</span> deptID = OLD.deptID;</div>
<div class="gbox info"><div class="gbox-label">Quando si usa nei trigger</div>
<p>Tipico quando hai fatto <b>SELECT COUNT(*) INTO var</b> e vuoi evitare una divisione per NULL/0, oppure quando NEW.col potrebbe essere NULL e devi fornire un valore di default. Esempio: <code style="font-size:12px">COALESCE(NEW.bonus, 0)</code> invece di scrivere un IF separato.</p>
</div>

<h3 class="gsub">IF / THEN / ELSEIF / ELSE</h3>
<div class="gcode"><span class="kw">IF</span> condizione1 <span class="kw">THEN</span>
  <span class="gcm">-- azione 1</span>
<span class="kw">ELSEIF</span> condizione2 <span class="kw">THEN</span>
  <span class="gcm">-- azione 2</span>
<span class="kw">ELSE</span>
  <span class="gcm">-- azione default</span>
<span class="kw">END IF</span>;</div>
<p style="font-size:12.5px;color:var(--ink-soft);margin-top:6px">Uso tipico: confrontare OLD e NEW per evitare aggiornamenti inutili (es. <code style="font-size:11.5px">IF OLD.deptID != NEW.deptID THEN</code>), o controllare una condizione prima di agire.</p>

<h3 class="gsub">REFERENCING — alias per NEW e OLD</h3>
<p style="font-size:13px;color:var(--ink-soft);margin-bottom:8px">In DB2 puoi dare un alias esplicito a NEW e OLD con <b>REFERENCING</b>:</p>
<div class="gcode"><span class="kw">CREATE OR REPLACE TRIGGER</span> supervisorFK
<span class="kw">BEFORE INSERT ON</span> EMP
<span class="kw">REFERENCING NEW AS</span> N          <span class="gcm">-- N.col invece di NEW.col</span>
<span class="kw">FOR EACH ROW</span>
<span class="kw">WHEN</span> ( <span class="kw">EXISTS</span> (
  <span class="kw">SELECT</span> * <span class="kw">FROM</span> EMP
  <span class="kw">WHERE</span> N.supervisor = EMP.ID
  <span class="kw">AND</span> EMP.isProf <span class="kw">IS FALSE</span> ) )
<span class="kw">SIGNAL SQLSTATE</span> <span class="gstr">'70001'</span>
<span class="kw">SET MESSAGE_TEXT</span> = <span class="gstr">'The supervisor is not a Prof!'</span>;</div>
<table class="gtbl" style="margin-top:10px">
<tr><th>Clausola</th><th>Significato</th></tr>
<tr><td><code>REFERENCING NEW AS N</code></td><td>Puoi scrivere N.col invece di NEW.col nel resto del trigger</td></tr>
<tr><td><code>REFERENCING OLD AS O</code></td><td>Puoi scrivere O.col invece di OLD.col</td></tr>
<tr><td><code>CREATE OR REPLACE TRIGGER</code></td><td>Crea il trigger, o lo sovrascrive se esiste già (equivale a DROP + CREATE)</td></tr>
</table>

<h3 class="gsub">WHEN con subquery EXISTS / NOT EXISTS</h3>
<p style="font-size:13px;color:var(--ink-soft);margin-bottom:8px">La clausola WHEN può contenere subquery complesse. Il trigger si esegue <b>solo se la condizione è vera</b> — non serve un IF nel corpo:</p>
<div class="gcode"><span class="gcm">-- Blocca se il supervisor non esiste o non ha supervisor</span>
<span class="kw">CREATE OR REPLACE TRIGGER</span> validReports
<span class="kw">BEFORE INSERT ON</span> ReportsTo
<span class="kw">REFERENCING NEW AS</span> N
<span class="kw">FOR EACH ROW</span>
<span class="kw">WHEN</span> ( <span class="kw">NOT EXISTS</span> (
  <span class="kw">SELECT</span> * <span class="kw">FROM</span> EMP
  <span class="kw">WHERE</span> N.EmpID = EMP.ID
  <span class="kw">AND</span> EMP.supervisor <span class="kw">IS NOT NULL</span> ) )
<span class="kw">SIGNAL SQLSTATE</span> <span class="gstr">'70002'</span>
<span class="kw">SET MESSAGE_TEXT</span> = <span class="gstr">'The employee has no supervisor!'</span>;</div>
<div class="gbox info"><div class="gbox-label">WHEN vs IF nel corpo</div>
<p>Con WHEN la condizione viene controllata <b>prima</b> di entrare nel corpo: se è falsa il trigger non viene nemmeno eseguito (più efficiente). Con IF nel corpo entri sempre, poi decidi cosa fare. Se il trigger deve solo segnalare un errore su una condizione, WHEN è più pulito. Se devi fare logica complessa con DECLARE/SELECT INTO, usa IF nel corpo.</p>
</div>`,

`<h3 class="gsub">Matrice degli eventi: quando serve un trigger?</h3>
<p style="font-size:13.5px;color:var(--ink-soft);margin-bottom:12px">Per ogni tabella e ogni evento (INSERT/UPDATE/DELETE) chiediti: <b>"Questa modifica può cambiare il contenuto della tabella target da mantenere?"</b></p>
<div class="gbox ex"><div class="gbox-label">Esempio — TDE Febbraio 2024 (vista BUDGET)</div>
<table class="gtbl">
<tr><th>Tabella</th><th>INSERT</th><th>UPDATE</th><th>DELETE</th></tr>
<tr><td>PROJECT</td><td>Sì: crea riga BUDGET</td><td>No (PK non cambia)</td><td>Sì: rimuovi da BUDGET</td></tr>
<tr><td>EMP</td><td>No</td><td>Sì: cambia salary → aggiorna costo</td><td>No</td></tr>
<tr><td>ASSIGNMENT</td><td>Sì: aggiunge salary al progetto</td><td>No (PK non cambia)</td><td>Sì: sottrae salary</td></tr>
</table>
</div>

<h3 class="gsub">Metodo passo-passo</h3>
<div class="gsteps">
<div class="gstep"><div class="gstep-n" style="background:var(--trig)"></div><div class="gstep-b">
  <strong>Scegli evento e tabella sorgente</strong>
  <p>AFTER INSERT ON tabella_che_cambia_i_dati</p>
</div></div>
<div class="gstep"><div class="gstep-n" style="background:var(--trig)"></div><div class="gstep-b">
  <strong>Scegli FOR EACH ROW (quasi sempre)</strong>
</div></div>
<div class="gstep"><div class="gstep-n" style="background:var(--trig)"></div><div class="gstep-b">
  <strong>Scrivi il corpo: usa NEW.col e OLD.col</strong>
  <p>Fai SELECT/INSERT/UPDATE/DELETE sulla tabella target. Se devi bloccare → RAISE EXCEPTION (con BEFORE).</p>
</div></div>
<div class="gstep"><div class="gstep-n" style="background:var(--trig)"></div><div class="gstep-b">
  <strong>Verifica la terminazione</strong>
</div></div>
</div>`,

`<h3 class="gsub">Grafo di attivazione</h3>
<p style="font-size:14px;color:var(--ink-soft);margin-bottom:12px">Ogni nodo = un trigger. C'è un arco da T1 a T2 se l'azione di T1 può attivare T2. Se il grafo è <b>aciclico</b> → terminazione garantita. Se ci sono cicli → analizza se le condizioni WHEN li bloccano.</p>
<div style="background:var(--paper2);border:1px solid var(--line);border-radius:12px;padding:14px;margin:12px 0">
<div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--trig);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px">Grafo di terminazione — TDE 2023</div>
<div style="display:flex;align-items:center;gap:0;flex-wrap:wrap;justify-content:center;margin-bottom:12px">
  <div style="background:var(--bg);border:1.5px solid var(--trig);border-radius:10px;padding:9px 14px;text-align:center;min-width:140px">
    <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;color:var(--trig)">T_total_salary</div>
    <div style="font-size:11px;color:var(--ink-soft);margin-top:3px">AFTER INSERT ON PERFORMANCE</div>
    <div style="font-size:11px;color:var(--ink-soft)">→ UPDATE su PERSON</div>
  </div>
  <div style="display:flex;align-items:center;padding:0 8px;color:var(--trig)">
    <div style="height:2px;width:30px;background:var(--trig)"></div>
    <div style="font-size:14px;color:var(--trig)">▶</div>
  </div>
  <div style="background:var(--bg);border:1.5px solid var(--trig);border-radius:10px;padding:9px 14px;text-align:center;min-width:130px">
    <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;color:var(--trig)">T_richest</div>
    <div style="font-size:11px;color:var(--ink-soft);margin-top:3px">AFTER UPDATE OF total_salary</div>
    <div style="font-size:11px;color:var(--ink-soft)">→ UPDATE su RICHEST</div>
  </div>
  <div style="display:flex;align-items:center;padding:0 8px;color:var(--ink-soft)">
    <div style="height:2px;width:30px;background:var(--ink-soft);opacity:.4"></div>
    <div style="font-size:14px;opacity:.4">▶</div>
  </div>
  <div style="background:var(--bg);border:1.5px dashed var(--line);border-radius:10px;padding:9px 14px;text-align:center;color:var(--ink-soft);font-size:12px;min-width:80px">
    (fine)
  </div>
</div>
<div style="background:rgba(47,211,152,.10);border:1px solid rgba(47,211,152,.35);border-radius:8px;padding:9px 13px;display:flex;align-items:center;gap:10px">
  <span style="font-size:18px">✅</span>
  <span style="font-size:13px;color:var(--trig);font-weight:600">Grafo aciclico → terminazione garantita</span>
  <span style="font-size:12px;color:var(--ink-soft)">Nessun ciclo: T_richest non può riattivare T_total_salary.</span>
</div>
</div>
<div class="gbox warn"><div class="gbox-label">Cicli pericolosi</div>
<p>Se T1 aggiorna tabella A che attiva T2 che aggiorna tabella A che attiva T1 → ciclo infinito. Serve una condizione WHEN che lo interrompa (es. IF NEW.val &lt;&gt; OLD.val).</p>
</div>`,

`<div class="gbox danger"><div class="gbox-label">Strategia: CREATE TABLE + Trigger — chi fa cosa?</div>
<p style="margin-bottom:10px">All'esame spesso ti danno uno schema ER collassato in tabelle e chiedono trigger per mantenere i vincoli. <b>Non tutto va nei trigger!</b> Alcuni vincoli si gestiscono meglio nella CREATE TABLE.</p>
<table class="gtbl" style="font-size:12.5px">
<tr><th>Tipo di vincolo</th><th>Dove si gestisce</th><th>Esempio</th></tr>
<tr><td>Attributi mutuamente esclusivi (prof ha level, admin ha role)</td><td><b>CHECK</b> nella CREATE TABLE</td><td><code>CHECK ((isProf AND level IS NOT NULL AND role IS NULL) OR (NOT isProf AND role IS NOT NULL AND level IS NULL))</code></td></tr>
<tr><td>FK deve esistere</td><td><b>REFERENCES</b> nella CREATE TABLE</td><td><code>supervisor INT REFERENCES EMP(ID)</code></td></tr>
<tr><td>FK deve avere una proprietà specifica (es. essere un prof)</td><td><b>Trigger</b> — CHECK non può fare query su altre righe</td><td>WHEN (EXISTS(SELECT * FROM EMP WHERE N.supervisor = EMP.ID AND EMP.isProf IS FALSE))</td></tr>
<tr><td>Comportamento alla cancellazione</td><td><b>ON DELETE</b> nella FK</td><td><code>ON DELETE SET NULL</code>, <code>ON DELETE CASCADE</code>, <code>ON DELETE NO ACTION</code></td></tr>
<tr><td>Vincolo cross-tabella (inserire in B solo se riga in A ha certe proprietà)</td><td><b>Trigger</b></td><td>ReportsTo solo se EMP.supervisor IS NOT NULL</td></tr>
</table>
<p style="margin-top:10px;font-size:12.5px;color:var(--ink-soft)"><b>Regola pratica:</b> se il vincolo riguarda solo i valori della riga stessa → CHECK. Se riguarda valori in altre righe o altre tabelle → Trigger. Le cancellazioni a cascata → ON DELETE nella FK.</p>
</div>

<div class="gbox ex"><div class="gbox-label">Esempio completo — CREATE TABLE + Trigger (TDE lug 2025)</div>
<p style="font-size:12.5px;color:var(--ink-soft);margin-bottom:8px">Schema: EMP (admin o prof), ReportsTo. Tre vincoli da gestire.</p>
<div class="gcode"><span class="gcm">-- La CREATE TABLE gestisce: CHECK (vincolo 1), FK esistenza (vincolo 2 parziale), ON DELETE (cancellazioni)</span>
<span class="kw">CREATE TABLE</span> EMP (
  ID        <span class="kw">INT NOT NULL PRIMARY KEY</span>,
  isProf    <span class="kw">BOOLEAN NOT NULL</span>,
  name      <span class="kw">VARCHAR</span>(30) <span class="kw">NOT NULL</span>,
  supervisor <span class="kw">INT REFERENCES</span> EMP(ID) <span class="kw">ON DELETE SET NULL</span>,  <span class="gcm">-- FK: esiste? ✓  È prof? serve trigger</span>
  role      <span class="kw">CHAR</span>(15),
  assistedEmp <span class="kw">INT REFERENCES</span> EMP(ID) <span class="kw">ON DELETE NO ACTION</span>,
  level     <span class="kw">INT</span>,
  <span class="kw">CONSTRAINT</span> SYNC <span class="kw">CHECK</span> (
    (isProf <span class="kw">IS TRUE AND</span> level <span class="kw">IS NOT NULL AND</span> role <span class="kw">IS NULL</span>) <span class="kw">OR</span>
    (isProf <span class="kw">IS FALSE AND</span> level <span class="kw">IS NULL AND</span> role <span class="kw">IS NOT NULL AND</span> assistedEmp <span class="kw">IS NOT NULL</span>))
);

<span class="kw">CREATE TABLE</span> ReportsTo (
  EmpID <span class="kw">INT NOT NULL REFERENCES</span> EMP(ID) <span class="kw">ON DELETE CASCADE</span>,
  date  <span class="kw">DATE NOT NULL</span>,
  <span class="kw">PRIMARY KEY</span> (EmpID, date)
);

<span class="gcm">-- I trigger completano i vincoli che CHECK/FK non possono esprimere</span>
<span class="gcm">-- Vincolo 2 completo: supervisor deve essere un PROF (non basta che esista)</span>
<span class="gcm">-- Vincolo 3: ReportsTo solo se l'impiegato ha un supervisor</span></div>
<p style="font-size:12px;color:var(--ink-soft);margin-top:8px"><b>Divisione:</b> Vincolo 1 → CHECK ✓ | Vincolo 2 → FK (esiste?) + Trigger (è prof?) | Vincolo 3 → FK (esiste?) + Trigger (ha supervisor?) | Cancellazioni → ON DELETE ✓</p>
</div>

<div class="gbox ex"><div class="gbox-label">Trigger classico — Aggiornare un totale (TDE Feb 2024)</div>
<div class="gcode"><span class="gcm">-- assignment inserito → aggiungi salary al BUDGET del progetto</span>
<span class="kw">CREATE TRIGGER</span> T4
<span class="kw">AFTER INSERT ON</span> ASSIGNMENT <span class="kw">FOR EACH ROW</span>
<span class="kw">BEGIN</span>
  <span class="kw">UPDATE</span> BUDGET
  <span class="kw">SET</span> COST = COST + (<span class="kw">SELECT</span> SALARY <span class="kw">FROM</span> EMP <span class="kw">WHERE</span> EID = NEW.EID)
  <span class="kw">WHERE</span> PID = NEW.PID;
<span class="kw">END</span>;

<span class="gcm">-- salary cambia → aggiorna BUDGET</span>
<span class="kw">CREATE TRIGGER</span> T3
<span class="kw">AFTER UPDATE OF</span> SALARY <span class="kw">ON</span> EMP <span class="kw">FOR EACH ROW</span>
<span class="kw">BEGIN</span>
  <span class="kw">UPDATE</span> BUDGET
  <span class="kw">SET</span> COST = COST + NEW.SALARY - OLD.SALARY
  <span class="kw">WHERE</span> PID = (<span class="kw">SELECT</span> PID <span class="kw">FROM</span> ASSIGNMENT <span class="kw">WHERE</span> EID = NEW.EID);
<span class="kw">END</span>;</div>
</div>
<div class="gbox ex"><div class="gbox-label">Trigger con blocco inserimento (TDE 2023)</div>
<div class="gcode"><span class="gcm">-- rifiuta inserimento se supera il budget del film</span>
<span class="kw">CREATE TRIGGER</span> limited_budget
<span class="kw">AFTER INSERT ON</span> PERFORMANCE <span class="kw">FOR EACH ROW</span>
<span class="kw">BEGIN</span>
  <span class="kw">IF</span> (<span class="kw">SELECT SUM</span>(salary) <span class="kw">FROM</span> PERFORMANCE <span class="kw">WHERE</span> MOVIEID = NEW.MOVIEID) &gt;
     (<span class="kw">SELECT</span> budget <span class="kw">FROM</span> MOVIE <span class="kw">WHERE</span> MOVIEID = NEW.MOVIEID)
  <span class="kw">THEN RAISE EXCEPTION</span> <span class="gstr">'Budget superato'</span>;
  <span class="kw">END IF</span>;
<span class="kw">END</span>;</div>
</div>

<div class="gbox ex"><div class="gbox-label">SIGNAL SQLSTATE + DECLARE + SELECT INTO (TDE sett 2023)</div>
<div class="gcode"><span class="gcm">-- blocca UPDATE se il camion è in manutenzione</span>
<span class="kw">CREATE TRIGGER</span> CheckMaintenance
<span class="kw">BEFORE UPDATE OF</span> truckPlate <span class="kw">ON</span> TRIP <span class="kw">FOR EACH ROW</span>
<span class="kw">BEGIN</span>
  <span class="kw">DECLARE</span> truck_status <span class="kw">VARCHAR</span>(20);
  <span class="kw">SELECT</span> status <span class="kw">INTO</span> truck_status
  <span class="kw">FROM</span> TRUCK <span class="kw">WHERE</span> PLATE = NEW.truckPlate;

  <span class="kw">IF</span> truck_status = <span class="gstr">'maintenance'</span> <span class="kw">THEN</span>
    <span class="kw">SIGNAL SQLSTATE</span> <span class="gstr">'45000'</span>
    <span class="kw">SET MESSAGE_TEXT</span> = <span class="gstr">'Truck under maintenance'</span>;
  <span class="kw">END IF</span>;
<span class="kw">END</span>;</div>
<p style="font-size:12.5px;color:var(--ink-soft);margin-top:8px">Pattern: DECLARE la variabile → SELECT INTO per leggerla → IF per decidere se segnalare l'errore.</p>
</div>

<div class="gbox ex"><div class="gbox-label">REFERENCING + WHEN + SIGNAL (TDE lug 2025)</div>
<div class="gcode"><span class="gcm">-- blocca INSERT su EMP se il supervisor indicato non è un prof</span>
<span class="kw">CREATE OR REPLACE TRIGGER</span> supervisorFK
<span class="kw">BEFORE INSERT ON</span> EMP
<span class="kw">REFERENCING NEW AS</span> N
<span class="kw">FOR EACH ROW</span>
<span class="kw">WHEN</span> ( <span class="kw">EXISTS</span> (
  <span class="kw">SELECT</span> * <span class="kw">FROM</span> EMP
  <span class="kw">WHERE</span> N.supervisor = EMP.ID
  <span class="kw">AND</span> EMP.isProf <span class="kw">IS FALSE</span> ) )
<span class="kw">SIGNAL SQLSTATE</span> <span class="gstr">'70001'</span>
<span class="kw">SET MESSAGE_TEXT</span> = <span class="gstr">'The supervisor is not a Prof!'</span>;

<span class="gcm">-- blocca INSERT su ReportsTo se l'impiegato non ha supervisor</span>
<span class="kw">CREATE OR REPLACE TRIGGER</span> validReports
<span class="kw">BEFORE INSERT ON</span> ReportsTo
<span class="kw">REFERENCING NEW AS</span> N
<span class="kw">FOR EACH ROW</span>
<span class="kw">WHEN</span> ( <span class="kw">NOT EXISTS</span> (
  <span class="kw">SELECT</span> * <span class="kw">FROM</span> EMP
  <span class="kw">WHERE</span> N.EmpID = EMP.ID
  <span class="kw">AND</span> EMP.supervisor <span class="kw">IS NOT NULL</span> ) )
<span class="kw">SIGNAL SQLSTATE</span> <span class="gstr">'70002'</span>
<span class="kw">SET MESSAGE_TEXT</span> = <span class="gstr">'The employee has no supervisor!'</span>;</div>
<p style="font-size:12.5px;color:var(--ink-soft);margin-top:8px">Nota: quando il trigger ha solo SIGNAL e nessuna logica complessa, non serve <span style="font-family:monospace">BEGIN...END</span> — la singola istruzione SIGNAL è il corpo.</p>
</div>

<div class="gbox ex"><div class="gbox-label">DECLARE + IF OLD != NEW + SIGNAL (TDE giu 2025)</div>
<div class="gcode"><span class="gcm">-- impedisce di eliminare l'ultimo dipendente di un dipartimento</span>
<span class="kw">CREATE TRIGGER</span> EmpDelete
<span class="kw">AFTER DELETE ON</span> EMP <span class="kw">FOR EACH ROW</span>
<span class="kw">BEGIN</span>
  <span class="kw">DECLARE</span> emp_count <span class="kw">INT</span>;
  <span class="kw">SELECT</span> <span class="kw">COUNT</span>(*) <span class="kw">INTO</span> emp_count
  <span class="kw">FROM</span> EMP <span class="kw">WHERE</span> deptID = OLD.deptID;

  <span class="kw">IF</span> emp_count = 0 <span class="kw">THEN</span>
    <span class="kw">SIGNAL SQLSTATE</span> <span class="gstr">'45000'</span>
    <span class="kw">SET MESSAGE_TEXT</span> = <span class="gstr">'Cannot delete the last employee in the department'</span>;
  <span class="kw">END IF</span>;

  <span class="kw">UPDATE</span> PROJECTS_INCOME
  <span class="kw">SET</span> perCapitaAmt = totAmt / emp_count
  <span class="kw">WHERE</span> deptID = OLD.deptID;
<span class="kw">END</span>;

<span class="gcm">-- aggiorna entrambi i dipartimenti quando cambia deptID</span>
<span class="kw">CREATE TRIGGER</span> DeptUpdateForEmp
<span class="kw">AFTER UPDATE ON</span> EMP <span class="kw">FOR EACH ROW</span>
<span class="kw">BEGIN</span>
  <span class="kw">IF</span> OLD.deptID != NEW.deptID <span class="kw">THEN</span>
    <span class="kw">UPDATE</span> PROJECTS_INCOME
    <span class="kw">SET</span> perCapitaAmt = totAmt / (<span class="kw">SELECT COUNT</span>(*) <span class="kw">FROM</span> EMP <span class="kw">WHERE</span> deptID = OLD.deptID)
    <span class="kw">WHERE</span> deptID = OLD.deptID;
    <span class="kw">UPDATE</span> PROJECTS_INCOME
    <span class="kw">SET</span> perCapitaAmt = totAmt / (<span class="kw">SELECT COUNT</span>(*) <span class="kw">FROM</span> EMP <span class="kw">WHERE</span> deptID = NEW.deptID)
    <span class="kw">WHERE</span> deptID = NEW.deptID;
  <span class="kw">END IF</span>;
<span class="kw">END</span>;</div>
<p style="font-size:12.5px;color:var(--ink-soft);margin-top:8px">Pattern classico su UPDATE: usa <b>IF OLD.col != NEW.col</b> per agire solo quando il valore è effettivamente cambiato, e aggiorna <b>entrambi</b> i "lati" (vecchio dipartimento e nuovo).</p>
</div>`]
},

"JPA": {
  tabs: ["Annotazioni base","Relazioni & owner","Fetch & cascade","Esempio completo"],
  sections: [`
<h3 class="gsub">Struttura minima di un'entità JPA</h3>
<div class="gcode"><span class="kw">@Entity</span>  <span class="gcm">// questa classe è una tabella nel DB</span>
<span class="kw">public class</span> Author <span class="kw">implements</span> Serializable {
  <span class="kw">@Id</span>
  <span class="kw">@GeneratedValue</span>(strategy = GenerationType.IDENTITY)
  <span class="kw">private int</span> id;           <span class="gcm">// chiave primaria, autoincrement</span>
  <span class="kw">private</span> String name;      <span class="gcm">// colonna normale</span>
  <span class="kw">@Temporal</span>(TemporalType.DATE)
  <span class="kw">private</span> Date birthDate;   <span class="gcm">// campo data</span>
  <span class="kw">@Basic</span>(fetch = FetchType.LAZY)
  <span class="kw">@Lob</span>
  <span class="kw">private byte</span>[] photo;     <span class="gcm">// Large Object: caricato solo su richiesta</span>
}</div>
<div class="gbox info"><div class="gbox-label">Regole obbligatorie</div>
<ul><li>@Entity sulla classe</li><li>@Id su un campo (la chiave primaria)</li><li>implements Serializable</li><li>Costruttore senza argomenti (anche implicito va bene)</li></ul>
</div>

<div class="gbox warn"><div class="gbox-label">@Basic(fetch = LAZY) su @Lob — Perché?</div>
<p><code>@Basic</code> si usa su <b>campi singoli</b> (non relazioni). Una foto è un <code>byte[]</code> da diversi MB. Senza LAZY, ogni volta che carichi l'entità carichi anche la foto — anche se non la mostri.</p>
<p><code>@Basic(fetch = FetchType.LAZY) @Lob private byte[] photo</code> = "carica la foto solo quando qualcuno chiama <code>getPhoto()</code>"</p>
<p><b>Regola:</b> <code>@Lob</code> va quasi sempre con <code>@Basic(fetch = LAZY)</code>.</p>
</div>

<div class="gbox info"><div class="gbox-label">GenerationType.AUTO vs IDENTITY</div>
<p><b>IDENTITY</b>: il DB genera l'ID con auto-increment (tipico MySQL). <b>AUTO</b>: lasci che JPA scelga la strategia. All'esame vanno bene entrambi.</p>
</div>`,

`<h3 class="gsub">Tipi di relazione</h3>
<table class="gtbl">
<tr><th>Annotazione</th><th>Cardinalità</th><th>Esempio</th></tr>
<tr><td>@ManyToOne</td><td>N:1</td><td>Book → Author (molti libri per un autore)</td></tr>
<tr><td>@OneToMany</td><td>1:N</td><td>Author → List&lt;Book&gt;</td></tr>
<tr><td>@OneToOne</td><td>1:1</td><td>Person ↔ Passport</td></tr>
<tr><td>@ManyToMany</td><td>N:M</td><td>Student ↔ Course</td></tr>
</table>

<h3 class="gsub">Owner side e mappedBy</h3>
<p style="font-size:13.5px;color:var(--ink-soft);margin-bottom:10px">L'<b>owner</b> è il lato che controlla la foreign key nel DB. Il lato non-owner usa <b>mappedBy = "nomeAttributo"</b> dove nomeAttributo è il campo nell'entità owner che punta a questa relazione.</p>

<div class="gbox danger"><div class="gbox-label">Regola semplice per mappedBy</div>
<p><b>"Come mi chiamo io, visto dall'altra classe?"</b></p>
<p>Se l'owner (l'altra classe) ha scritto <code>private Author <b>pippo</b></code>, tu scrivi <code>mappedBy = "pippo"</code>. Vai nella classe owner, guarda come ti ha chiamato, e metti quel nome.</p>
</div>

<div class="gcode"><span class="gcm">// Book è OWNER: ha la FK author_id nel DB</span>
<span class="gcm">// L'owner ha @JoinColumn, MAI mappedBy</span>
<span class="kw">@ManyToOne</span>
<span class="kw">@JoinColumn</span>(name = <span class="gstr">"author_id"</span>)
<span class="kw">private</span> Author author;  <span class="gcm">// owner</span>

<span class="gcm">// Author è NON-owner: usa mappedBy</span>
<span class="gcm">// Book mi chiama "author" → mappedBy = "author"</span>
<span class="kw">@OneToMany</span>(mappedBy = <span class="gstr">"author"</span>)
<span class="kw">private</span> List&lt;Book&gt; books;</div>

<div class="gbox warn"><div class="gbox-label">Chi ha l'annotazione? Come leggere la tabella del TDE</div>
<p>La traccia dice "Relazione Author → Profile": intende l'annotazione scritta <b>dentro la classe Author</b>, sul campo <code>profile</code>.<br>
"Relazione Profile → Author": intende l'annotazione scritta <b>dentro AuthorProfile</b>, sul campo <code>author</code>.</p>
<p><b>Owner</b> → scrive <code>@JoinColumn</code> (o <code>@JoinTable</code>), niente mappedBy<br>
<b>Non-owner</b> → scrive <code>mappedBy = "..."</code>, niente JoinColumn</p>
</div>

<div class="gbox info"><div class="gbox-label">Regola per scegliere l'owner</div>
<ul><li><b>@ManyToOne / @OneToMany:</b> sempre il lato "Many" è owner (ha la FK)</li><li><b>@ManyToMany:</b> scegli liberamente; usa @JoinTable sull'owner</li><li><b>@OneToOne:</b> owner = il lato con la FK (guarda lo schema relazionale)</li></ul>
</div>
<div class="gcode"><span class="gcm">// ManyToMany: owner usa @JoinTable</span>
<span class="kw">@ManyToMany</span>
<span class="kw">@JoinTable</span>(name = <span class="gstr">"actor_movie"</span>,
  joinColumns = {<span class="kw">@JoinColumn</span>(name = <span class="gstr">"movie_id"</span>)},
  inverseJoinColumns = {<span class="kw">@JoinColumn</span>(name = <span class="gstr">"actor_id"</span>)})
<span class="kw">private</span> List&lt;Artist&gt; actors;  <span class="gcm">// owner</span>

<span class="gcm">// lato non-owner</span>
<span class="kw">@ManyToMany</span>(mappedBy = <span class="gstr">"actors"</span>)
<span class="kw">private</span> List&lt;Movie&gt; movies;</div>`,

`<h3 class="gsub">Fetch type: LAZY vs EAGER</h3>
<table class="gtbl">
<tr><th>Tipo</th><th>Carica i dati</th><th>Default per</th></tr>
<tr><td>EAGER</td><td>Subito, con l'entità principale</td><td>@ManyToOne, @OneToOne</td></tr>
<tr><td>LAZY</td><td>Solo al primo accesso</td><td>@OneToMany, @ManyToMany</td></tr>
</table>
<div class="gbox info"><div class="gbox-label">Regola veloce — Trucco mnemonico</div>
<p>Guarda la <b>seconda parola</b> dell'annotazione:<br>
<b>To<span style="color:var(--d-low)">One</span> → EAGER</b> (un singolo oggetto, pochi dati)<br>
<b>To<span style="color:var(--d-high)">Many</span> → LAZY</b> (potenzialmente tanti oggetti)</p>
</div>

<div class="gbox danger"><div class="gbox-label">Ragionamento del prof: l'effetto moltiplicativo</div>
<p>Ragiona su <b>quanti oggetti carichi in totale</b>. Se carichi 1 Author con EAGER verso Articles (50 articoli), e ogni Article ha EAGER verso Keywords (10 keyword): 1 → 50 → 500 oggetti. Accettabile.</p>
<p>Ma se Keyword → Articles è EAGER e una keyword popolare ha 10.000 articoli, e ogni articolo carica 10 keyword: 10.000 × 10 = <b>100.000 oggetti</b>. Troppo!</p>
<ul>
<li>Ordine delle <b>centinaia</b> → EAGER accettabile</li>
<li>Ordine delle <b>migliaia o più</b> → LAZY obbligatorio</li>
<li>Campo grande (foto, file binari) → <b>@Lob + LAZY</b></li>
</ul>
</div>

<h3 class="gsub">Cascade</h3>
<table class="gtbl">
<tr><th>CascadeType</th><th>Cosa propaga</th></tr>
<tr><td>PERSIST</td><td>Salva automaticamente i figli quando salvi il padre</td></tr>
<tr><td>REMOVE</td><td>Cancella i figli quando cancelli il padre (usa con cautela!)</td></tr>
<tr><td>MERGE</td><td>Aggiorna i figli quando aggiorni il padre</td></tr>
<tr><td>ALL</td><td>Tutte le operazioni</td></tr>
</table>

<div class="gbox info"><div class="gbox-label">Cascade è OPZIONALE</div>
<p>Non sei obbligato a mettere un cascade. Se non vuoi propagare nulla, <b>non metti niente</b>. All'esame esce quasi sempre solo <b>REMOVE</b> e a volte <b>PERSIST</b>. MERGE e ALL sono rarissimi.</p>
</div>

<div class="gbox danger"><div class="gbox-label">Regola: CASCADE.REMOVE</div>
<p><b>REMOVE solo se il figlio non può esistere senza il padre</b> (composizione).</p>
<ul>
<li>Cancello Author → cancella il Profile (senza autore non ha senso) → <b>REMOVE</b></li>
<li>Cancello Author → cancella i suoi Articles → <b>REMOVE</b></li>
<li>Cancello Article → cancello le Keyword? <b>NO!</b> Sono condivise → <b>nessun cascade</b></li>
</ul>
<p><b>Mai CASCADE.REMOVE su @ManyToMany</b> — cancelleresti entità condivise!</p>
<p style="margin-top:8px"><b>Indizio dal testo:</b> se dice che un'entità appartiene a <b>esattamente una</b> altra (1:1), cancellando il padre il figlio resta orfano → REMOVE. Es: "un Brand appartiene a esattamente una Category" → cancellando Category, cascada REMOVE su Brand.</p>
</div>`,

`<div class="gbox ex"><div class="gbox-label">Esempio — Author/Article/Keyword (TDE Gennaio 2026)</div>
<p style="font-size:13px;color:var(--ink-soft);margin-bottom:12px">50k autori, 50k profili, 200k articoli, 2k keyword. Autore: 1-50 articoli. Articolo: 5-10 keyword. Keyword popolari: migliaia di articoli.</p>
<table class="gtbl" style="font-size:12px">
<tr><th>Relazione</th><th>Required?</th><th>Owner</th><th>Fetch</th><th>Cascade</th><th>Annotazione</th></tr>
<tr><td>Author→Profile</td><td style="color:var(--d-low)">Sì (pat.1)</td><td>Profile</td><td>EAGER</td><td>REMOVE</td><td>@OneToOne(mappedBy="author", fetch=EAGER, cascade=REMOVE)</td></tr>
<tr><td>Profile→Author</td><td style="color:var(--d-high)">No</td><td>Profile</td><td>EAGER</td><td>None</td><td>@OneToOne(fetch=EAGER) @JoinColumn(name="author_id")</td></tr>
<tr><td>Keyword→Article</td><td style="color:var(--d-low)">Sì (pat.2)</td><td>Article</td><td>LAZY</td><td>None</td><td>@ManyToMany(mappedBy="keywords", fetch=LAZY)</td></tr>
<tr><td>Author→Article</td><td style="color:var(--d-low)">Sì (pat.1)</td><td>Article</td><td>LAZY</td><td>REMOVE</td><td>@OneToMany(mappedBy="mainAuthor", fetch=LAZY, cascade=REMOVE)</td></tr>
</table>
<div class="gbox info" style="margin-top:10px"><div class="gbox-label">Perché mappedBy = "author" e non "profile"?</div>
<p style="font-size:12.5px">Author non è owner (lo è Profile). Quindi Author scrive mappedBy. Va a guardare la classe Profile e trova <code>private Author <b>author</b></code> → scrive <code>mappedBy = "author"</code>. Stessa logica per Keyword: va in Article, trova <code>private List&lt;Keyword&gt; <b>keywords</b></code> → scrive <code>mappedBy = "keywords"</code>.</p>
</div>
</div>

<div class="gbox ex"><div class="gbox-label">Esempio completo — Movie & Artist (TDE 2023)</div>
<div class="gcode"><span class="kw">@Entity</span>
<span class="kw">public class</span> Artist <span class="kw">implements</span> Serializable {
  <span class="kw">@Id @GeneratedValue</span>(strategy=GenerationType.IDENTITY)
  <span class="kw">private int</span> id;
  <span class="kw">private</span> String firstname, lastname, role;
  <span class="kw">@Basic</span>(fetch=FetchType.LAZY) <span class="kw">@Lob</span>
  <span class="kw">private byte</span>[] photo; <span class="gcm">// LAZY: foto grandi, solo se serve</span>

  <span class="kw">@OneToMany</span>(mappedBy=<span class="gstr">"director"</span>, fetch=FetchType.EAGER)
  <span class="kw">@OrderBy</span>(<span class="gstr">"issuedate DESC"</span>)
  <span class="kw">private</span> List&lt;Movie&gt; directedMovies; <span class="gcm">// EAGER: pochi film per regista</span>

  <span class="kw">@ManyToMany</span>(mappedBy=<span class="gstr">"actors"</span>, fetch=FetchType.EAGER)
  <span class="kw">@OrderBy</span>(<span class="gstr">"issuedate DESC"</span>)
  <span class="kw">private</span> List&lt;Movie&gt; actedMovies; <span class="gcm">// EAGER: curriculum breve</span>
}

<span class="kw">@Entity</span>
<span class="kw">public class</span> Movie <span class="kw">implements</span> Serializable {
  <span class="kw">@Id @GeneratedValue</span>(strategy=GenerationType.IDENTITY)
  <span class="kw">private int</span> id;
  <span class="kw">private</span> String title, genre; <span class="kw">private int</span> revenues;
  <span class="kw">@Temporal</span>(TemporalType.DATE) <span class="kw">private</span> Date issuedate;

  <span class="kw">@ManyToOne @JoinColumn</span>(name=<span class="gstr">"director_id"</span>)
  <span class="kw">private</span> Artist director; <span class="gcm">// owner: Movie ha la FK</span>

  <span class="kw">@ManyToMany</span>
  <span class="kw">@JoinTable</span>(name=<span class="gstr">"actor_movie"</span>,
    joinColumns={<span class="kw">@JoinColumn</span>(name=<span class="gstr">"movie_id"</span>)},
    inverseJoinColumns={<span class="kw">@JoinColumn</span>(name=<span class="gstr">"actor_id"</span>)})
  <span class="kw">private</span> List&lt;Artist&gt; actors; <span class="gcm">// owner</span>
}</div>
</div>`]
},

"Theory": {
  tabs: ["ACID & Isolamento","R-tree","Recovery & WAL"],
  sections: [`
<h3 class="gsub">Proprietà ACID</h3>
<table class="gtbl">
<tr><th>Proprietà</th><th>Significato</th></tr>
<tr><td><b>A</b>tomicity</td><td>Una transazione va tutta o non va: o tutto commit o tutto abort</td></tr>
<tr><td><b>C</b>onsistency</td><td>Il DB deve restare in uno stato consistente prima e dopo ogni transazione</td></tr>
<tr><td><b>I</b>solation</td><td>Le transazioni concorrenti non devono interferire tra loro</td></tr>
<tr><td><b>D</b>urability</td><td>Dopo un commit, i dati sopravvivono anche ai guasti di sistema</td></tr>
</table>

<h3 class="gsub">Livelli di isolamento SQL</h3>
<table class="gtbl">
<tr><th>Livello</th><th>Dirty read</th><th>Non-repeatable read</th><th>Phantom read</th></tr>
<tr><td>Read Uncommitted</td><td class="no">Possibile</td><td class="no">Possibile</td><td class="no">Possibile</td></tr>
<tr><td>Read Committed</td><td class="ok">No</td><td class="no">Possibile</td><td class="no">Possibile</td></tr>
<tr><td>Repeatable Read</td><td class="ok">No</td><td class="ok">No</td><td class="no">Possibile</td></tr>
<tr><td>Serializable</td><td class="ok">No</td><td class="ok">No</td><td class="ok">No</td></tr>
</table>
<div class="gbox danger"><div class="gbox-label">Le anomalie della concorrenza — spiegazione completa</div>
<p style="margin-bottom:10px">Se uno schedule <b>non è serializzabile</b> (fuori da CSR e VSR), può presentare queste anomalie. Uno schedule serializzabile le evita tutte.</p>
<table class="gtbl" style="font-size:12.5px">
<tr><th>Anomalia</th><th>Cosa succede</th><th>Esempio</th></tr>
<tr><td><b>Dirty Read</b><br>(lettura sporca)</td><td>T1 legge un dato scritto da T2, ma T2 <b>non ha ancora fatto commit</b>. Se T2 fa abort, T1 ha letto un valore che non esiste.</td><td>w2(x) → r1(x) → abort2<br>T1 ha letto un "fantasma"</td></tr>
<tr><td><b>Lost Update</b><br>(aggiornamento perso)</td><td>T1 e T2 leggono x, poi entrambe lo scrivono. La write di T1 viene <b>sovrascritta</b> da T2 senza che T2 abbia tenuto conto della modifica di T1.</td><td>r1(x) r2(x) w1(x) w2(x)<br>La modifica di T1 è persa</td></tr>
<tr><td><b>Non-repeatable Read</b><br>(lettura non ripetibile)</td><td>T1 legge x due volte, ma tra le due letture T2 ha <b>modificato</b> x. T1 vede due valori diversi per lo stesso dato.</td><td>r1(x) w2(x) r1(x)<br>Le due letture danno risultati diversi</td></tr>
<tr><td><b>Phantom Read</b><br>(lettura fantasma)</td><td>T1 esegue una query con WHERE due volte, ma tra le due T2 ha <b>inserito/cancellato righe</b>. T1 vede un set diverso di risultati.</td><td>T1: SELECT WHERE salary>50k → 10 righe<br>T2: INSERT riga con salary=60k<br>T1: stessa SELECT → 11 righe</td></tr>
</table>
<div class="gbox warn" style="margin-top:10px"><div class="gbox-label">All'esame: "H è anomaly-free?"</div>
<p>Se H è <b>serializzabile</b> (CSR o VSR) → <b>sì</b>, è anomaly-free: equivale a un'esecuzione seriale.<br>
Se H <b>non è serializzabile</b> → <b>no</b>, le anomalie sono possibili. Non serve trovare quale anomalia specifica: basta dire che non essendo serializzabile non può garantire di evitarle tutte.</p>
</div>
</div>`,

`<h3 class="gsub">Cos'è un R-tree</h3>
<p style="font-size:14px;color:var(--ink-soft);margin-bottom:12px">Un R-tree è una struttura dati spaziale per indicizzare oggetti multi-dimensionali (punti, rettangoli, poligoni). È analogo al B+ tree ma per dati spaziali.</p>
<div class="gsteps">
<div class="gstep"><div class="gstep-n" style="background:var(--theo)"></div><div class="gstep-b">
  <strong>MBB (Minimum Bounding Box/Rectangle)</strong>
  <p>Ogni nodo interno del R-tree raggruppa i figli in un <b>rettangolo minimo che li contiene tutti</b> (MBB). La ricerca scende nell'albero solo nei sotto-alberi i cui MBB si sovrappongono alla query.</p>
</div></div>
<div class="gstep"><div class="gstep-n" style="background:var(--theo)"></div><div class="gstep-b">
  <strong>Differenze principali dal B+ tree</strong>
  <p>1) Gli MBB dei fratelli possono <b>sovrapporsi</b> (in B+ le chiavi non si sovrappongono).<br>
  2) I dati sono multi-dimensionali, non lineari.<br>
  3) Una ricerca può richiedere di esplorare più sotto-alberi (path multipli).</p>
</div></div>
<div class="gstep"><div class="gstep-n" style="background:var(--theo)"></div><div class="gstep-b">
  <strong>Inserimento</strong>
  <p>Scegli il nodo foglia che necessita della minima espansione del MBB per contenere il nuovo oggetto. Se il nodo è pieno → split del nodo, aggiornamento dei MBB verso l'alto.</p>
</div></div>
</div>`,

`<h3 class="gsub">WAL — Write-Ahead Logging</h3>
<p style="font-size:14px;color:var(--ink-soft);margin-bottom:12px">WAL è la regola fondamentale del logging per il recovery: <b>scrivi il record di log su disco PRIMA di scrivere il dato modificato su disco</b>. Questo garantisce che il recovery possa sempre disfare (UNDO) o rifare (REDO) ogni operazione.</p>
<div class="gbox info"><div class="gbox-label">Perché WAL</div>
<p>Se il sistema crasha dopo aver scritto il dato ma prima del log, non sapremmo come fare UNDO. WAL garantisce che il log sia sempre "davanti" ai dati.</p>
</div>

<h3 class="gsub">2PC — Two Phase Commit (distributed)</h3>
<div class="gsteps">
<div class="gstep"><div class="gstep-n" style="background:var(--theo)"></div><div class="gstep-b">
  <strong>Fase 1 — Prepare: il coordinatore chiede a tutti i nodi "Puoi committare?"</strong>
  <p>Ogni nodo risponde YES o NO. Se qualcuno dice NO → abort su tutti.</p>
</div></div>
<div class="gstep"><div class="gstep-n" style="background:var(--theo)"></div><div class="gstep-b">
  <strong>Fase 2 — Commit/Abort: il coordinatore decide e notifica tutti</strong>
  <p>Se tutti YES → commit globale. Altrimenti → abort globale. Garantisce atomicità distribuita.</p>
</div></div>
</div>`]
}

let activeGuide=null;

function openGuide(type,el){
  const panel=document.getElementById("gpanel");
  // toggle off
  if(activeGuide===type){
    panel.classList.remove("open");
    activeGuide=null;
    document.querySelectorAll(".topic").forEach(t=>t.classList.remove("active"));
    return;
  }
  activeGuide=type;
  document.querySelectorAll(".topic").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  panel.style.setProperty("--tc",TYPE_COLORS_HEX[type]);

  const g=GUIDES[type];
  if(!g){panel.classList.remove("open");return;}
  panel.classList.add("open");
  renderGuidePanel(type,g);
  setTimeout(()=>panel.scrollIntoView({behavior:"smooth",block:"nearest"}),50);
}

function closeGuide(){
  document.getElementById("gpanel").classList.remove("open");
  document.querySelectorAll(".topic").forEach(t=>t.classList.remove("active"));
  activeGuide=null;
}

function renderGuidePanel(type,g){
  const col=TYPE_COLORS_HEX[type];
  const tabs=g.tabs.map((t,i)=>`<button class="gtab ${i===0?'active':''}" onclick="switchTab(${i})" id="gtab${i}" style="${i===0?'background:'+col+';border-color:'+col:''}">${t}</button>`).join("");
  const secs=g.sections.map((s,i)=>`<div class="gsection ${i===0?'active':''}" id="gsec${i}">${s}</div>`).join("");
  document.getElementById("gpanel-content").innerHTML=`
    <div class="ghead">
      <div class="gtopic-dot" style="background:${col}"></div>
      <h2>${type}</h2>
    </div>
    <div class="gtabs">${tabs}</div>
    ${secs}`;
  // store col for tab switching
  document.getElementById("gpanel-content").dataset.col=col;
}

function switchTab(i){
  const col=document.getElementById("gpanel-content").dataset.col;
  document.querySelectorAll(".gtab").forEach((t,j)=>{
    t.classList.toggle("active",j===i);
    t.style.background=j===i?col:"";t.style.borderColor=j===i?col:"";
  });
  document.querySelectorAll(".gsection").forEach((s,j)=>s.classList.toggle("active",j===i));
}

// ─── DONUT & RENDER ─────────────────────────────────────────────────────────
function donut(segs,size,thick,centerMain,centerSub,mainColor){
  const r=(size-thick)/2,c=2*Math.PI*r,total=segs.reduce((a,s)=>a+s.v,0)||1;
  let off=0,arcs="";
  segs.forEach(s=>{const len=s.v/total*c;
    arcs+=`<circle class="donut-seg" cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${thick}" stroke-dasharray="${len.toFixed(2)} ${(c-len).toFixed(2)}" stroke-dashoffset="${(-off).toFixed(2)}" transform="rotate(-90 ${size/2} ${size/2})"/>`;
    off+=len;});
  return `<div class="donut-wrap" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--todo)" stroke-width="${thick}"/>${arcs}
    </svg>
    <div class="donut-center">
      <div class="pc" style="font-size:${size*.28}px;color:${mainColor||'var(--ink)'}">${centerMain}</div>
      ${centerSub?`<div class="lb" style="font-size:${Math.max(8,size*.085)}px;margin-top:2px">${centerSub}</div>`:""}
    </div></div>`;
}

function tallyAll(){
  let b=0,m=0,a=0,nr=0,todo=0,tot=0;
  DATA.forEach(t=>t.exercises.forEach(e=>{const s=st(e.id);tot++;
    if(s.done){if(s.diff==='b')b++;else if(s.diff==='m')m++;else if(s.diff==='a')a++;else nr++;}else todo++;}));
  return {b,m,a,nr,todo,tot,done:b+m+a+nr};
}
function tdeStatus(t){let d=0;t.exercises.forEach(e=>{if(st(e.id).done)d++;});
  return {done:d,tot:t.exercises.length,full:d===t.exercises.length&&d>0,started:d>0};}

function renderStats(){
  const x=tallyAll();
  let tdeFull=0,tdePart=0;DATA.forEach(t=>{const s=tdeStatus(t);if(s.full)tdeFull++;else if(s.started)tdePart++;});
  const tot=DATA.length,pcDone=Math.round(x.done/x.tot*100);
  const diffSegs=[{v:x.b,color:'var(--d-low)'},{v:x.m,color:'var(--d-mid)'},{v:x.a,color:'var(--d-high)'},{v:x.nr,color:'var(--d-none)'}];
  document.getElementById("stats").innerHTML=`
  <div class="card stat">
    ${donut(diffSegs,84,15,pcDone+"%","svolti")}
    <div class="meta"><div class="t">Esercizi svolti</div><div class="big">${x.done}<span style="font-size:16px;color:var(--ink-soft)">/${x.tot}</span></div>
      <div class="leg">
        <span><i class="dot" style="background:var(--d-low)"></i>${x.b} bassa</span>
        <span><i class="dot" style="background:var(--d-mid)"></i>${x.m} media</span>
        <span><i class="dot" style="background:var(--d-high)"></i>${x.a} alta</span>
        ${x.nr?`<span><i class="dot" style="background:var(--d-none)"></i>${x.nr} non valutata</span>`:""}
      </div></div>
  </div>
  <div class="card stat">
    ${donut([{v:tdeFull,color:'var(--conc)'},{v:tdePart,color:'#9db8ec'}],84,15,tdeFull+"","appelli")}
    <div class="meta"><div class="t">TDE completati</div><div class="big">${tdeFull}<span style="font-size:16px;color:var(--ink-soft)">/${tot}</span></div>
      <div class="leg">
        <span><i class="dot" style="background:var(--conc)"></i>${tdeFull} finiti</span>
        <span><i class="dot" style="background:#9db8ec"></i>${tdePart} iniziati</span>
        <span><i class="dot" style="background:var(--todo)"></i>${tot-tdeFull-tdePart} intatti</span>
      </div></div>
  </div>
  <div class="card stat">
    ${donut([{v:x.b,color:'var(--d-low)'},{v:x.m,color:'var(--d-mid)'},{v:x.a,color:'var(--d-high)'}],84,15,x.a+"","tosti",'var(--d-high)')}
    <div class="meta"><div class="t">Difficoltà alta</div><div class="big" style="color:var(--d-high)">${x.a}</div>
      <div class="leg"><span style="color:var(--ink-soft)">esercizi su cui hai<br>faticato di più —<br>vedi "Da ripassare"</span></div></div>
  </div>`;
}

function renderTopics(){
  const types=["Ranking","Concurrency control","Triggers","Physical DB","JPA","Theory"];
  const agg={};types.forEach(t=>agg[t]={b:0,m:0,a:0,nr:0,tot:0});
  DATA.forEach(t=>t.exercises.forEach(e=>{const s=st(e.id);const g=agg[e.type];g.tot++;
    if(s.done){if(s.diff==='b')g.b++;else if(s.diff==='m')g.m++;else if(s.diff==='a')g.a++;else g.nr++;}}));
  const list=types.filter(t=>agg[t].tot>0)
    .sort((p,q)=>{const A=agg[p],B=agg[q];return (B.a-A.a)||(B.m-A.m)||((B.a+B.m+B.b+B.nr)-(A.a+A.m+A.b+A.nr));});
  document.getElementById("topics").innerHTML=list.map(t=>{
    const g=agg[t],done=g.b+g.m+g.a+g.nr,pc=g.tot?Math.round(done/g.tot*100):0,col=TYPE_COLORS[t],isActive=activeGuide===t;
    const mix=[];if(g.b)mix.push(`<span style="color:var(--d-low)"><b>${g.b}</b> bassa</span>`);
    if(g.m)mix.push(`<span style="color:var(--d-mid)"><b>${g.m}</b> media</span>`);
    if(g.a)mix.push(`<span style="color:var(--d-high)"><b>${g.a}</b> alta</span>`);
    return `<div class="card topic ${g.a>0?'hot':''} ${isActive?'active':''}" style="--tc:${TYPE_COLORS_HEX[t]}" onclick="openGuide('${t}',this)">
      ${donut([{v:g.b,color:'var(--d-low)'},{v:g.m,color:'var(--d-mid)'},{v:g.a,color:'var(--d-high)'},{v:g.nr,color:'var(--d-none)'}],62,11,pc+"","",col)}
      <div class="meta">
        <div class="name"><i class="dot" style="background:${col}"></i>${t}</div>
        <div class="frac">${done}/${g.tot} svolti</div>
        <div class="mix">${mix.length?mix.join(""):'<span style="color:var(--ink-soft)">—</span>'}</div>
        <div class="guide-hint">Guida <span class="arr">▶</span></div>
      </div></div>`;
  }).join("");
}

function renderReview(){
  const items=[];
  DATA.forEach(t=>t.exercises.forEach(e=>{const s=st(e.id);
    if(s.done&&(s.diff==='a'||s.diff==='m'))items.push({when:t.short,type:e.type,letter:e.letter,diff:s.diff});}));
  items.sort((p,q)=>(p.diff==='a'?0:1)-(q.diff==='a'?0:1));
  const el=document.getElementById("review");
  if(!items.length){el.innerHTML=`<div class="empty">Nessun esercizio segnato come difficile finora.</div>`;return;}
  el.innerHTML=items.map(i=>`<div class="row">
    <span class="badge" style="background:${DIFF_COLORS[i.diff]}">${DIFF_LABEL[i.diff]}</span>
    <span class="when">${i.when}</span>
    <span class="what"><i class="dot" style="background:${TYPE_COLORS[i.type]}"></i>${i.letter}. ${i.type}</span>
  </div>`).join("");
}

function renderList(){
  document.getElementById("tdelist").innerHTML=DATA.map((t,ti)=>{
    const s=tdeStatus(t),pc=Math.round(s.done/s.tot*100);
    const rows=t.exercises.map(e=>{
      const x=st(e.id),col=TYPE_COLORS[e.type];
      const cls=x.done&&x.diff?x.diff:'';
      const dp=lv=>`<span class="dpill ${lv} ${x.diff===lv?'on':''}" onclick="setDiff('${e.id}','${lv}')">${DIFF_LABEL[lv]}</span>`;
      return `<div class="ex ${cls}">
        <span class="lt">${e.letter}.</span>
        <span class="ty"><i class="dot" style="background:${col}"></i><b>${e.type}</b></span>
        <span class="ctrls">
          <button class="toggle ${x.done?'on-done':''}" onclick="setDone('${e.id}')">${x.done?'✓ Fatto':'Fatto'}</button>
          <span class="diffset ${x.done?'':'dis'}">${dp('b')}${dp('m')}${dp('a')}</span>
        </span>
      </div>`;
    }).join("");
    return `<div class="card tde ${s.started?'open':''}" id="tde${ti}">
      <div class="tde-head" onclick="document.getElementById('tde${ti}').classList.toggle('open')">
        <span class="date">${t.label}</span>
        <span class="pill">${s.done}/${s.tot}</span>
        <span class="spacer"></span>
        <span class="bar"><i style="width:${pc}%;background:${s.full?'var(--conc)':'var(--d-low)'}"></i></span>
        <span class="chev">&#9654;</span>
      </div>
      <div class="ex-list">${rows}</div>
    </div>`;
  }).join("");
}

function renderAll(){renderStats();renderTopics();renderReview();renderList();
  const x=tallyAll();
  document.getElementById("fnote").textContent=`${x.done}/${x.tot} esercizi svolti · ${x.a} ad alta difficoltà · ${DATA.length} appelli`;
}

function _renderAuthBar(user){
  const bar=document.getElementById("auth-bar");
  if(!bar)return;
  if(user){
    const photo=user.photoURL?`<img src="${user.photoURL}" class="auth-avatar" referrerpolicy="no-referrer">`:"";
    bar.innerHTML=`<div class="auth-user">${photo}<span class="auth-name">${user.displayName||user.email}</span><button class="auth-logout" onclick="_signOut()">Logout</button><span class="auth-sync">☁ sincronizzato</span></div>`;
  } else {
    bar.innerHTML=`<button class="auth-google-btn" onclick="_signIn()"><svg width="14" height="14" viewBox="0 0 48 48" style="flex:none"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.8-6.8C35.8 2.4 30.2 0 24 0 14.6 0 6.6 5.4 2.7 13.3l7.9 6.1C12.4 13 17.8 9.5 24 9.5z"/><path fill="#4285F4" d="M46.1 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.4c-.5 2.8-2.1 5.1-4.5 6.7l7 5.4c4.1-3.8 6.5-9.4 6.5-16.1z"/><path fill="#FBBC05" d="M10.6 28.6A14.4 14.4 0 0 1 9.5 24c0-1.6.3-3.2.8-4.6l-7.9-6.1A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.6 10.7l7.9-6.1z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7-5.4c-2 1.4-4.6 2.2-8.2 2.2-6.2 0-11.5-4.2-13.4-9.9l-7.9 6.1C6.6 42.6 14.6 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>Login con Google</button>`;
  }
}

    projectId:"db2-exam",

  };
  firebase.initializeApp(firebaseConfig);
  _db=firebase.firestore();
  const auth=firebase.auth();

  auth.onAuthStateChanged(async(user)=>{
    currentUser=user;
    if(user){
      try{
        const doc=await _db.collection("users").doc(user.uid).get();
        if(doc.exists&&doc.data().state){
          STATE=doc.data().state;
        } else {
          // New user: offer to import localStorage data
          try{
            const local=localStorage.getItem(KEY);

              const parsed=JSON.parse(local);
              if(Object.keys(parsed).length>0){
                if(confirm(`Hai ${Object.keys(parsed).length} progressi salvati localmente.
Vuoi importarli su Firebase?`)){
                  STATE=parsed;
                  save();
                }
              }
            }
          }catch(e){}
        }
      }catch(e){console.error("Firestore load error:",e);}

      STATE={};

function _signIn(){
  const provider=new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithPopup(provider).catch(e=>alert("Login fallito: "+e.message));
}
function _signOut(){

    firebase.auth().signOut();
  }
}
